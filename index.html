<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLS Studio Legale - Gestione Pratiche</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes fadeIn { from {opacity:0;transform:translateY(10px);} to {opacity:1;transform:translateY(0);}}
        @keyframes slideDown { from {opacity:0;transform:translateY(-20px);} to {opacity:1;transform:translateY(0);}}
        .animate-fadein { animation: fadeIn 0.3s; }
        .animate-slidedown { animation: slideDown 0.4s; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            .print-full { width: 100% !important; max-width: 100% !important; padding: 20px !important; }
        }
        .scaduta { background-color: #fee2e2 !important; border-left: 4px solid #dc2626 !important; }
        .priorita-bassa { background-color: #dbeafe; }
        .priorita-media { background-color: #3b82f6; color: white; }
        .priorita-alta { background-color: #1e3a8a; color: white; }
        .stato-svolgimento { background-color: #fef3c7; color: #92400e; }
        .stato-fatto { background-color: #d1fae5; color: #065f46; }
        .stato-bloccato { background-color: #fee2e2; color: #991b1b; }
        /* Pratica FATTO: sfumata con linea colorata */
        .pratica-fatto-card {
            opacity: 0.6;
            position: relative;
            overflow: hidden;
        }
        .pratica-fatto-card::after {
            content: '';
            position: absolute;
            left: 0; right: 0;
            top: 50%;
            height: 3px;
            background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 10;
        }
        .fatto-strike {
            text-decoration: line-through;
            text-decoration-color: #6366f1;
            text-decoration-thickness: 2px;
            opacity: 0.7;
        }
        /* Riga tabella FATTO */
        .tr-fatto td {
            opacity: 0.55;
            position: relative;
        }
        .tr-fatto td::after {
            content: '';
            position: absolute;
            left: 0; right: 0;
            top: 50%;
            height: 2px;
            background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
            pointer-events: none;
        }
        .badge-fatto { text-decoration: line-through; text-decoration-color: #065f46; text-decoration-thickness: 2px; }
        .avv-avatar { display:inline-flex;align-items:center;justify-content:center;width:2.2rem;height:2.2rem;border-radius:50%;font-size:0.65rem;font-weight:700;color:white;flex-shrink:0;letter-spacing:0.03em; }
        .avv-avatar-lg { display:inline-flex;align-items:center;justify-content:center;width:3rem;height:3rem;border-radius:50%;font-size:0.8rem;font-weight:700;color:white;flex-shrink:0; }
        .color-swatch { width:2rem;height:2rem;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 2px #e5e7eb;cursor:pointer;transition:transform 0.15s; }
        .color-swatch:hover { transform:scale(1.2); }
        .color-swatch.selected { box-shadow:0 0 0 3px #4f46e5; transform:scale(1.15); }
    </style>
</head>
<body>
<div id="app" class="min-h-screen bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 flex items-center justify-center">
    <div class="text-white text-center">
        <img src="https://i.postimg.cc/63h6w5x4/2026_02_18_12_20_55_slslegal_it.png" alt="SLS Studio Legale" class="w-72 h-72 mx-auto mb-4 object-contain animate-pulse">
        <p class="text-xl">Caricamento...</p>
    </div>
</div>
<script>
const SUPABASE_URL = 'https://vwfubfydakocuxhepwkq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ziNieyV1K_9bPBNJu6GHUQ_j2kVEyn2';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TIPI_PRATICA = ['civile','penale','amministrativo','lavoro','famiglia','tributario'];
const AUTORITA = ['Tribunale','CGT1','CGT2','Mediazione','Cassazione','Corte d\'Appello','Stragiudiziale'];
const PALETTE_COLORI = [
    '#4f46e5','#7c3aed','#db2777','#059669','#d97706',
    '#dc2626','#0891b2','#65a30d','#9333ea','#c2410c',
    '#0ea5e9','#14b8a6','#f59e0b','#ef4444','#8b5cf6',
    '#10b981','#f97316','#6366f1','#ec4899','#84cc16'
];
const AVV_COLORS = PALETTE_COLORI;
const avvColorMap = {};

function getAvvColor(nome) {
    if (!nome) return '#6b7280';
    const avv = state.avvocati.find(a => a.nome_completo === nome);
    if (avv && avv.colore) return avv.colore;
    if (!avvColorMap[nome]) {
        let h = 0;
        for (let i = 0; i < nome.length; i++) h = nome.charCodeAt(i) + ((h<<5)-h);
        avvColorMap[nome] = AVV_COLORS[Math.abs(h) % AVV_COLORS.length];
    }
    return avvColorMap[nome];
}
function getIniziali(nome) {
    if (!nome) return '?';
    return nome.split(' ').filter(Boolean).map(n=>n[0]).join('').toUpperCase().slice(0,3);
}
function avvAvatar(nome, lg=false) {
    return `<span class="${lg?'avv-avatar-lg':'avv-avatar'}" style="background:${getAvvColor(nome)}" title="${nome||''}">${getIniziali(nome)}</span>`;
}

function isAdmin() { return state.user?.username === 'admin'; }
function isResp() { return state.user?.ruolo === 'responsabile_dipartimento'; }
function isAvvocato() { return state.user?.ruolo === 'avvocato'; }

// Avvocati del dipartimento del responsabile corrente
function myAvvocati() {
    if (isAdmin()) return state.avvocati.map(a=>a.nome_completo);
    if (isResp()) return state.dipartimenti.filter(d=>d.responsabile===state.user.nome_completo).map(d=>d.avvocato);
    return [state.user.nome_completo];
}

let state = {
    user:null, activeTab:'dashboard', viewMode:'cards',
    pratiche:[], avvocati:[], utenti:[], noteAggiornamento:[], dipartimenti:[],
    searchTerm:'', filterStato:'tutti', filterTipo:'tutti', filterPriorita:'tutti', filterAvvocato:'tutti',
    showModal:false, showAvvocatoModal:false, showUtenteModal:false, showNoteModal:false,
    showAlertModal:false, showDettaglioPratica:false,
    editingPratica:null, editingAvvocato:null, editingUtente:null, viewingPratica:null,
    alertList:[], successMessage:'',
    formData:{ cliente:'', tipo_pratica:'civile', autorita:'', descrizione:'', stato:'svolgimento',
        data_apertura:today(), data_aggiornamento_attivita:today(), scadenza:'', timeline:'',
        priorita:'media', rgnr:'', avvocato:'', nota_aggiornamento:'', alert_giorni:'1',
        responsabile_dipartimento:'' },
    avvForm:{ nome:'', cognome:'', email:'', telefono:'', specializzazione:'civile', colore:'#4f46e5' },
    utenteForm:{ username:'', password:'', nome_completo:'', email:'', ruolo:'avvocato' },
    noteForm:{ nota:'' },
    notifiche:[], notificheLoading:false
};

function today() { return new Date().toISOString().split('T')[0]; }

function isPraticaScaduta(p) {
    if (!p.scadenza || p.stato==='fatto') return false;
    return new Date(p.scadenza) < new Date(today()) && p.stato==='svolgimento';
}
function isPraticaInScadenza(p) {
    if (!p.scadenza || p.stato==='fatto' || !p.alert_giorni) return false;
    const giorni = p.alert_giorni==='1' ? 3 : 10;
    const diff = (new Date(p.scadenza) - new Date()) / (1000*60*60*24);
    return diff > 0 && diff <= giorni;
}

function checkAlertGiornaliero() {
    const lastCheck = localStorage.getItem('sls_last_alert_check');
    if (lastCheck === today()) return;
    localStorage.setItem('sls_last_alert_check', today());
    eseguiCheckAlert();
}

function eseguiCheckAlert() {
    const alerts = [];
    const myAvv = myAvvocati();
    state.pratiche.forEach(p => {
        if (!p.scadenza || p.stato==='fatto') return;
        // Filtra per visibilità
        if (!isAdmin() && !myAvv.includes(p.avvocato)) return;
        const diff = Math.ceil((new Date(p.scadenza) - new Date()) / (1000*60*60*24));
        if (p.alert_giorni) {
            const giorni = p.alert_giorni==='1' ? 3 : 10;
            if (diff > 0 && diff <= giorni) alerts.push({ pratica:p, diff, tipo:'imminente' });
        }
        if (diff <= 0 && p.stato==='svolgimento') alerts.push({ pratica:p, diff, tipo:'scaduta' });
    });
    if (alerts.length > 0) {
        state.alertList = alerts;
        state.showAlertModal = true;
        salvaStorico(alerts);
    }
}

async function salvaStorico(alerts) {
    for (const a of alerts) {
        const utente = state.utenti.find(u => u.nome_completo === a.pratica.avvocato);
        await sb.from('alert_storico').insert([{
            data_alert: today(), pratica_id: a.pratica.id,
            cliente: a.pratica.cliente, scadenza: a.pratica.scadenza,
            avvocato: a.pratica.avvocato, avvocato_id: utente?.id || null,
            tipo: a.tipo, diff_giorni: a.diff
        }]);
    }
}

async function loadAll() {
    await Promise.all([loadPratiche(), loadAvvocati(), loadUtenti(), loadDipartimenti()]);
}
async function loadPratiche() {
    const { data, error } = await sb.from('pratiche').select('*').order('numero',{ascending:false});
    if (!error) state.pratiche = data||[];
}
async function loadAvvocati() {
    const { data, error } = await sb.from('avvocati').select('*').order('cognome');
    if (!error) state.avvocati = data||[];
}
async function loadUtenti() {
    const { data, error } = await sb.from('utenti').select('*').order('nome_completo');
    if (!error) state.utenti = data||[];
}
async function loadDipartimenti() {
    const { data, error } = await sb.from('dipartimenti').select('*');
    if (!error) state.dipartimenti = data||[];
}
async function loadNote(praticaId) {
    const { data, error } = await sb.from('note_aggiornamento').select('*')
        .eq('pratica_id', praticaId).order('data_nota',{ascending:false});
    if (!error) state.noteAggiornamento = data||[];
}

async function loadNotifiche() {
    state.notificheLoading = true;
    let query = sb.from('alert_storico').select('*')
        .eq('cancellata', false)
        .order('data_alert', { ascending: false });
    if (!isAdmin()) {
        const myAvv = myAvvocati();
        if (myAvv.length === 1) query = query.eq('avvocato', myAvv[0]);
        else if (myAvv.length > 1) query = query.in('avvocato', myAvv);
    }
    const { data, error } = await query;
    state.notifiche = error ? [] : (data || []);
    state.notificheLoading = false;
}

async function cancellaNotifica(id) {
    await sb.from('alert_storico').update({ cancellata: true }).eq('id', id);
    state.notifiche = state.notifiche.filter(n => n.id !== id);
    render();
}

async function cancellaNotificheScadenzaSpostata(praticaId, nuovaScadenza) {
    // Cancella notifiche di tipo "scaduta" o "imminente" per questa pratica
    // se la nuova scadenza è in avanti rispetto a oggi
    if (!nuovaScadenza || nuovaScadenza <= today()) return;
    await sb.from('alert_storico')
        .update({ cancellata: true })
        .eq('pratica_id', praticaId)
        .in('tipo', ['scaduta', 'imminente']);
}

function getPraticheVisibili() {
    if (isAdmin()) return state.pratiche;
    const myAvv = myAvvocati();
    return state.pratiche.filter(p => myAvv.includes(p.avvocato));
}

function cleanPratica(p) {
    const c = {...p};
    ['timeline','scadenza','data_modifica','nota_aggiornamento','rgnr','autorita','responsabile_dipartimento'].forEach(k => {
        if (!c[k]||c[k]==='') c[k]=null;
    });
    if (!c.data_aggiornamento_attivita) c.data_aggiornamento_attivita = today();
    return c;
}

async function savePratica(p) {
    try {
        const cp = cleanPratica(p);
        let praticaId;
        if (cp.id) {
            const { error } = await sb.from('pratiche').update(cp).eq('id',cp.id);
            if (error) throw error;
            praticaId = cp.id;
        } else {
            cp.numero = Date.now(); cp.data_modifica = today();
            const { data, error } = await sb.from('pratiche').insert([cp]).select().single();
            if (error) throw error;
            praticaId = data.id;
        }
        if (p.nota_aggiornamento?.trim()) {
            await sb.from('note_aggiornamento').insert([{
                pratica_id:praticaId, data_nota:today(),
                nota:p.nota_aggiornamento.trim(),
                autore:state.user.nome_completo, autore_id:state.user.id
            }]);
        }
        await loadPratiche(); return true;
    } catch(e) { alert('Errore: '+e.message); return false; }
}

async function aggiungiNota(praticaId, nota) {
    try {
        const { error } = await sb.from('note_aggiornamento').insert([{
            pratica_id:praticaId, data_nota:today(), nota,
            autore:state.user.nome_completo, autore_id:state.user.id
        }]);
        if (error) throw error;
        await loadNote(praticaId); return true;
    } catch(e) { alert('Errore: '+e.message); return false; }
}

async function deletePratica(id) {
    if (!isAdmin()) { alert('Solo admin può eliminare pratiche'); return; }
    const { error } = await sb.from('pratiche').delete().eq('id',id);
    if (!error) { await loadPratiche(); showSuccess('Pratica eliminata!'); }
    else alert('Errore: '+error.message);
}

async function saveAvvocato(avv) {
    try {
        avv.nome_completo = avv.nome+' '+avv.cognome;
        if (avv.id) {
            const { error } = await sb.from('avvocati').update(avv).eq('id',avv.id);
            if (error) throw error;
        } else {
            avv.data_creazione = today();
            const { error } = await sb.from('avvocati').insert([avv]);
            if (error) throw error;
        }
        await loadAvvocati(); return true;
    } catch(e) { alert('Errore: '+e.message); return false; }
}

async function deleteAvvocato(id) {
    if (!isAdmin()) { alert('Solo admin può eliminare avvocati'); return; }
    const nome = state.avvocati.find(a=>a.id===id)?.nome_completo;
    if (state.pratiche.filter(p=>p.avvocato===nome).length>0) {
        alert('Impossibile eliminare: ci sono pratiche assegnate!'); return;
    }
    const { error } = await sb.from('avvocati').delete().eq('id',id);
    if (!error) { await loadAvvocati(); showSuccess('Avvocato eliminato!'); }
    else alert('Errore: '+error.message);
}

async function saveUtente(u) {
    try {
        if (u.id) {
            const upd={...u}; if (!upd.password||upd.password==='') delete upd.password;
            const { error } = await sb.from('utenti').update(upd).eq('id',u.id);
            if (error) throw error;
        } else {
            const { error } = await sb.from('utenti').insert([u]);
            if (error) throw error;
        }
        await loadUtenti(); return true;
    } catch(e) { alert('Errore: '+e.message); return false; }
}

async function deleteUtente(id) {
    if (id===state.user.id) { alert('Non puoi eliminare il tuo account!'); return; }
    const { error } = await sb.from('utenti').delete().eq('id',id);
    if (!error) { await loadUtenti(); showSuccess('Utente eliminato!'); }
    else alert('Errore: '+error.message);
}

// Dipartimenti
async function saveDipartimento(responsabile, responsabileId, avvocato, avvocatoId, nomeDip) {
    const exists = state.dipartimenti.find(d=>d.responsabile===responsabile && d.avvocato===avvocato);
    if (exists) return;
    await sb.from('dipartimenti').insert([{ responsabile, responsabile_id:responsabileId, avvocato, avvocato_id:avvocatoId, nome_dipartimento:nomeDip||null }]);
    await loadDipartimenti();
}

async function aggiornaNomeDip(responsabile, nomeDip) {
    // Aggiorna nome_dipartimento per tutte le righe di quel responsabile
    await sb.from('dipartimenti').update({ nome_dipartimento: nomeDip }).eq('responsabile', responsabile);
    await loadDipartimenti();
    showSuccess('Nome dipartimento aggiornato!');
    render();
}
async function deleteDipartimento(id) {
    await sb.from('dipartimenti').delete().eq('id',id);
    await loadDipartimenti();
}

async function login(username, password) {
    const { data, error } = await sb.from('utenti').select('*')
        .eq('username',username).eq('password',password).eq('attivo',true).single();
    if (error||!data) { alert('Username o password errati!'); return false; }
    state.user = data;
    await loadAll();
    checkAlertGiornaliero();
    eseguiCheckAlert();
    render(); return true;
}

function logout() { state.user=null; state.activeTab='dashboard'; render(); }

function esportaCSV(nomeFile, righe) {
    if (!righe||righe.length===0) { alert('Nessun dato!'); return; }
    const headers = Object.keys(righe[0]);
    const csv = [headers.join(';'), ...righe.map(r=>headers.map(h=>{
        const v=r[h]===null||r[h]===undefined?'':String(r[h]);
        return '"'+v.replace(/"/g,'""')+'"';
    }).join(';'))].join('\n');
    const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=nomeFile;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
}

async function esportaTuttiCSV() {
    const [note,utenti] = await Promise.all([
        sb.from('note_aggiornamento').select('*').order('data_nota',{ascending:false}),
        sb.from('utenti').select('id,username,nome_completo,email,ruolo,attivo')
    ]);
    esportaCSV(`pratiche-${today()}.csv`,state.pratiche);
    await new Promise(r=>setTimeout(r,300));
    esportaCSV(`avvocati-${today()}.csv`,state.avvocati);
    await new Promise(r=>setTimeout(r,300));
    if (!utenti.error&&utenti.data?.length) { esportaCSV(`utenti-${today()}.csv`,utenti.data); await new Promise(r=>setTimeout(r,300)); }
    if (!note.error&&note.data?.length) esportaCSV(`note-${today()}.csv`,note.data);
    showSuccess('CSV esportati!');
}

async function esportaDati() {
    const data={pratiche:state.pratiche,avvocati:state.avvocati,dataEsportazione:new Date().toISOString(),versione:'3.0'};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`sls-backup-${today()}.json`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    showSuccess('Backup JSON esportato!');
}

function importaDati(e) {
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=async(ev)=>{
        try {
            const data=JSON.parse(ev.target.result);
            if(!confirm(`Importare ${data.pratiche?.length||0} pratiche?`)) return;
            for(const a of (data.avvocati||[])) { delete a.id; delete a.created_at; await sb.from('avvocati').insert([a]); }
            for(const p of (data.pratiche||[])) { delete p.id; delete p.created_at; await sb.from('pratiche').insert([p]); }
            await loadAll(); showSuccess('Importati!');
        } catch(er) { alert('Errore: '+er.message); }
    };
    reader.readAsText(file); e.target.value='';
}

function stampa() { window.print(); }
function showSuccess(msg) {
    state.successMessage=msg; render();
    setTimeout(()=>{ state.successMessage=''; render(); },3000);
}

function getStatoBadge(s) { return {svolgimento:'stato-svolgimento',fatto:'stato-fatto',bloccato:'stato-bloccato'}[s]||'stato-svolgimento'; }
function getStatoIcon(s) { return s==='fatto'?'✅':s==='bloccato'?'🚫':'🔄'; }
function getPrioritaBadge(p) { return {bassa:'priorita-bassa',media:'priorita-media',alta:'priorita-alta'}[p]||'priorita-media'; }

function getAvvStats(nome) {
    const ps=state.pratiche.filter(p=>p.avvocato===nome);
    return {totali:ps.length,svolgimento:ps.filter(p=>p.stato==='svolgimento').length,
        fatto:ps.filter(p=>p.stato==='fatto').length,bloccato:ps.filter(p=>p.stato==='bloccato').length};
}

function getFiltered() {
    const visibili = getPraticheVisibili();
    return visibili.filter(p=>{
        const s=state.searchTerm.toLowerCase();
        const match=p.cliente.toLowerCase().includes(s)||p.descrizione.toLowerCase().includes(s)||(p.rgnr||'').toLowerCase().includes(s);
        return match&&(state.filterStato==='tutti'||p.stato===state.filterStato)&&
            (state.filterTipo==='tutti'||p.tipo_pratica===state.filterTipo)&&
            (state.filterPriorita==='tutti'||p.priorita===state.filterPriorita)&&
            (state.filterAvvocato==='tutti'||p.avvocato===state.filterAvvocato);
    });
}

function fmtDate(d) { return d?new Date(d).toLocaleDateString('it-IT'):''; }

function getRuoloBadge(r) {
    if (r==='amministratore'||r==='admin') return {label:'👑 Admin', cls:'text-red-600'};
    if (r==='responsabile_dipartimento') return {label:'🏢 Resp. Dipartimento', cls:'text-purple-600'};
    return {label:'⚖️ Avvocato', cls:'text-indigo-600'};
}

function render() {
    if (!state.user) { renderLogin(); return; }
    const visibili = getPraticheVisibili();
    const stats={
        totali:visibili.length,
        svolgimento:visibili.filter(p=>p.stato==='svolgimento').length,
        fatto:visibili.filter(p=>p.stato==='fatto').length,
        bloccato:visibili.filter(p=>p.stato==='bloccato').length,
        scadute:visibili.filter(p=>isPraticaScaduta(p)).length,
        inScadenza:visibili.filter(p=>isPraticaInScadenza(p)).length
    };
    const filtered=getFiltered();
    const tabs=[
        {id:'dashboard',label:'Dashboard',icon:'📊',show:true},
        {id:'pratiche',label:'Pratiche',icon:'📁',show:true},

                    🔔 ${stats.inScadenza+stats.scadute} alert
                </button>`:''}

        </div>

        ${state.successMessage?`<div class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 rounded-lg mb-6 shadow-lg no-print"><p class="font-semibold">✅ ${state.successMessage}</p></div>`:''}

                            ${p.responsabile_dipartimento?`<span class="px-3 py-1 bg-purple-50 text-purple-700 rounded-full text-xs font-semibold">🏢 ${p.responsabile_dipartimento}</span>`:''}
                            ${inScad&&!fatto?`<span class="px-3 py-1 bg-orange-100 text-orange-700 rounded-full text-xs font-semibold animate-pulse">🔔 Scade tra ${Math.ceil((new Date(p.scadenza)-new Date())/(1000*60*60*24))}gg</span>`:''}

async function renderAvvocati() {
    const storicoMap = {};
    for (const a of state.avvocati) {
        const { data } = await sb.from('alert_storico').select('*').eq('avvocato', a.nome_completo).order('data_alert',{ascending:false}).limit(10);
        storicoMap[a.nome_completo] = data||[];
    }
    const html = `
    <div class="space-y-6">
        <div class="bg-white rounded-xl shadow-lg p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">👥 Archivio Avvocati</h2>
                <div class="flex gap-2">
                    <button onclick="stampa()" class="px-6 py-3 bg-gray-600 text-white rounded-lg no-print">🖨️ Stampa</button>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                    const colore = a.colore||getAvvColor(a.nome_completo);
                    const resp = state.dipartimenti.find(d=>d.avvocato===a.nome_completo)?.responsabile;
                    return `
                    <div class="rounded-xl p-6 border-2" style="background:${colore}18;border-color:${colore}40;">
                        <div class="flex items-center gap-3 mb-4">
                            ${avvAvatar(a.nome_completo, true)}
                            <div>
                                <h3 class="text-xl font-bold text-gray-800">${a.nome_completo}</h3>
                                <p class="text-sm font-semibold" style="color:${colore}">${a.specializzazione}</p>
                                ${resp?`<p class="text-xs text-purple-600">🏢 Resp: ${resp}</p>`:''}
                            </div>
                        </div>
                        <div class="space-y-1 mb-4">
                            <p class="text-sm text-gray-600">📧 ${a.email}</p>
                            <p class="text-sm text-gray-600">📱 ${a.telefono}</p>
                        </div>
                        <div class="bg-white rounded-lg p-3 mb-4">
                            <div class="grid grid-cols-4 gap-2 text-center">
                                <div><p class="text-lg font-bold text-gray-800">${st.totali}</p><p class="text-xs text-gray-500">Totali</p></div>
                                <div><p class="text-lg font-bold text-yellow-600">${st.svolgimento}</p><p class="text-xs text-gray-500">Svolgimento</p></div>
                                <div><p class="text-lg font-bold text-green-600">${st.fatto}</p><p class="text-xs text-gray-500">Fatto</p></div>
                                <div><p class="text-lg font-bold text-red-600">${st.bloccato}</p><p class="text-xs text-gray-500">Bloccato</p></div>
                            </div>
                        </div>
                        ${storico.length>0?`
                        <div class="mb-4">
                            <p class="text-xs font-semibold text-gray-500 mb-2">📋 Storico Alert (ultimi ${storico.length})</p>
                            <div class="space-y-1 max-h-36 overflow-y-auto">
                                ${storico.map(s=>`
                                <div class="text-xs p-2 rounded flex justify-between items-center ${s.tipo==='scaduta'?'bg-red-50 text-red-700':'bg-orange-50 text-orange-700'}">
                                    <span>${s.tipo==='scaduta'?'⚠️':'🔔'} <strong>${s.cliente}</strong> — scad. ${fmtDate(s.scadenza)}</span>
                                    <span class="text-gray-400 ml-2">${fmtDate(s.data_alert)}</span>
                                </div>`).join('')}
                            </div>
                        </div>`:`
                        <div class="mb-4 p-3 bg-gray-50 rounded-lg text-center">
                            <p class="text-xs text-gray-400">Nessun alert registrato</p>
                        </div>`}
                        ${isAdmin()?`
                        <div class="flex gap-2 no-print">
                            <button onclick="openAvvocatoModal(${JSON.stringify(a).replace(/"/g,'&quot;')})" class="flex-1 px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">✏️ Modifica</button>
                            <button onclick="confirmDeleteAvvocato('${a.id}')" class="flex-1 px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600">🗑️ Elimina</button>

                    </div>`;

        </div>
    </div>`;
}

// ── TAB NOTIFICHE ──────────────────────────────────────────────────────
function renderNotifiche() {
    const lista = state.notifiche;
    const loading = state.notificheLoading;
    const grouped = {};
    lista.forEach(a => {
        const k = a.data_alert||'N/D';
        if (!grouped[k]) grouped[k]=[];
        grouped[k].push(a);
    });

    return `
    <div class="space-y-6">
        <div class="bg-white rounded-xl shadow-lg p-6">
            <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">🔔 Notifiche</h2>
                    <p class="text-sm text-gray-500 mt-1">${isAdmin()?'Tutte le notifiche dello studio':'Le tue notifiche personali'}</p>
                </div>
                <button onclick="loadNotifiche().then(()=>render())" class="px-5 py-2 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700">🔄 Aggiorna</button>
            </div>

            ${loading?`<div class="text-center py-12"><p class="text-gray-400 text-lg">Caricamento...</p></div>`:
            lista.length===0?`
                <div class="text-center py-16">
                    <div class="text-6xl mb-4">🔕</div>
                    <p class="text-gray-400 text-lg">Nessuna notifica registrata</p>
                    <p class="text-gray-300 text-sm mt-1">Le notifiche compariranno qui al primo accesso giornaliero</p>
                </div>`:`

            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
                <div class="bg-gray-50 rounded-xl p-4 text-center border border-gray-200">
                    <p class="text-2xl font-bold text-gray-700">${lista.length}</p>
                    <p class="text-xs text-gray-500">Totali</p>
                </div>
                <div class="bg-red-50 rounded-xl p-4 text-center border border-red-200">
                    <p class="text-2xl font-bold text-red-600">${lista.filter(a=>a.tipo==='scaduta').length}</p>
                    <p class="text-xs text-gray-500">Scadute</p>
                </div>
                <div class="bg-orange-50 rounded-xl p-4 text-center border border-orange-200">
                    <p class="text-2xl font-bold text-orange-600">${lista.filter(a=>a.tipo==='imminente').length}</p>
                    <p class="text-xs text-gray-500">Imminenti</p>
                </div>
            </div>

            <div class="space-y-6">
                ${Object.keys(grouped).sort((a,b)=>b.localeCompare(a)).map(data=>`
                    <div>
                        <div class="flex items-center gap-3 mb-3">
                            <div class="h-px flex-1 bg-gray-200"></div>
                            <span class="text-sm font-semibold text-gray-500 bg-gray-100 px-3 py-1 rounded-full">📅 ${fmtDate(data)}</span>
                            <div class="h-px flex-1 bg-gray-200"></div>
                        </div>
                        <div class="space-y-2">
                            ${grouped[data].map(a => {
                                const pratica = state.pratiche.find(p=>p.id===a.pratica_id);
                                return `
                                <div class="flex items-center justify-between p-4 rounded-xl border-2 cursor-pointer hover:shadow-md transition-shadow
                                    ${a.tipo==='scaduta'?'bg-red-50 border-red-200 hover:border-red-400':'bg-orange-50 border-orange-200 hover:border-orange-400'}"
                                    onclick="apriDettaglioNotifica('${a.pratica_id}')">
                                    <div class="flex items-center gap-3">
                                        ${avvAvatar(a.avvocato)}
                                        <div>
                                            <p class="font-bold text-gray-800">${a.cliente}</p>
                                            <div class="flex gap-3 text-xs text-gray-500 mt-0.5 flex-wrap">
                                                <span>👤 ${a.avvocato||'-'}</span>
                                                <span>⏰ Scadenza: <strong>${fmtDate(a.scadenza)}</strong></span>
                                                ${a.diff_giorni!==null&&a.diff_giorni!==undefined?`<span>${a.diff_giorni<=0?`Scaduta da ${Math.abs(a.diff_giorni)}gg`:`${a.diff_giorni}gg al termine`}</span>`:''}
                                            </div>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <span class="px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap ${a.tipo==='scaduta'?'bg-red-200 text-red-800':'bg-orange-200 text-orange-800'}">
                                            ${a.tipo==='scaduta'?'⚠️ Scaduta':'🔔 Imminente'}
                                        </span>
                                        ${pratica?`<span class="text-xs text-indigo-600 font-semibold no-print">📂 Apri →</span>`:''}
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>`).join('')}
            </div>`}
        </div>
    </div>`;
}

function renderModalDettaglioPratica() {
    const p = state.viewingPratica;
    if (!p) return '';
    const scaduta = isPraticaScaduta(p);
    const inScad = isPraticaInScadenza(p);
    const canEdit = isAdmin() || isResp() || p.avvocato === state.user.nome_completo;
    return `
    <div class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full my-8 animate-slidedown">
            <div class="bg-gradient-to-r from-indigo-700 to-purple-700 text-white p-6 flex justify-between items-center">
                <h2 class="text-xl font-bold">📂 Dettaglio Pratica</h2>
                <button onclick="state.showDettaglioPratica=false;render()" class="hover:bg-white/20 rounded-full p-2 text-2xl">✕</button>
            </div>
            <div class="p-6 space-y-4">
                <div class="flex items-center gap-3 mb-2">
                    ${avvAvatar(p.avvocato, true)}
                    <div>
                        <h3 class="text-2xl font-bold text-gray-800">${p.cliente}</h3>
                        <p class="text-sm text-gray-500">${p.avvocato||'-'}</p>
                    </div>
                </div>
                <div class="flex flex-wrap gap-2">
                    <span class="px-3 py-1 rounded-full text-xs font-semibold ${getStatoBadge(p.stato)}">${getStatoIcon(p.stato)} ${p.stato.toUpperCase()}</span>
                    <span class="px-3 py-1 rounded-full text-xs font-semibold ${getPrioritaBadge(p.priorita)}">${p.priorita.toUpperCase()}</span>
                    <span class="px-3 py-1 bg-gray-100 rounded-full text-xs font-semibold">${p.tipo_pratica}</span>
                    ${p.autorita?`<span class="px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-xs font-semibold">🏛️ ${p.autorita}</span>`:''}
                    ${p.rgnr?`<span class="px-3 py-1 bg-purple-100 text-purple-800 rounded-full text-xs font-semibold">RGNR: ${p.rgnr}</span>`:''}
                    ${scaduta?`<span class="px-3 py-1 bg-red-100 text-red-700 rounded-full text-xs font-semibold">⚠️ SCADUTA</span>`:''}
                    ${inScad?`<span class="px-3 py-1 bg-orange-100 text-orange-700 rounded-full text-xs font-semibold">🔔 In scadenza</span>`:''}
                </div>
                <div class="bg-gray-50 rounded-xl p-4 space-y-2">
                    <p class="text-gray-700"><strong>Descrizione:</strong> ${p.descrizione}</p>
                    <div class="grid grid-cols-2 gap-2 text-sm text-gray-600">
                        <p>📅 Apertura: <strong>${fmtDate(p.data_apertura)}</strong></p>
                        ${p.scadenza?`<p class="${scaduta?'text-red-600':inScad?'text-orange-600':''}">⏰ Scadenza: <strong>${fmtDate(p.scadenza)}</strong></p>`:''}
                        ${p.responsabile_dipartimento?`<p>🏢 Responsabile: <strong>${p.responsabile_dipartimento}</strong></p>`:''}
                        ${p.data_aggiornamento_attivita?`<p>🔄 Aggiornamento: <strong>${fmtDate(p.data_aggiornamento_attivita)}</strong></p>`:''}
                    </div>
                </div>
                <div class="flex gap-3 pt-2">
                    ${canEdit?`
                    <button onclick="state.showDettaglioPratica=false;openPraticaModal(state.viewingPratica)" class="flex-1 px-6 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-lg font-semibold">
                        ✏️ Modifica Pratica
                    </button>`:''}
                    <button onclick="state.showDettaglioPratica=false;state.showNoteModal=true;render()" class="flex-1 px-6 py-3 bg-green-600 text-white rounded-lg font-semibold">
                        📝 Vedi Note
                    </button>
                    <button onclick="state.showDettaglioPratica=false;render()" class="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg font-semibold">Chiudi</button>
                </div>
            </div>
        </div>
    </div>`;
}

    await loadNote(praticaId);

async function apriDettaglioNotifica(praticaId) {
    const p = state.pratiche.find(pr=>pr.id===praticaId);
    if (!p) { alert('Pratica non trovata o non più disponibile.'); return; }

    state.showDettaglioPratica = true;
    render();

async function aggiungiAlDip(respId, respNome) {
    const sel = document.getElementById(`addAvv_${respId}`);
    if (!sel||!sel.value) return;
    const avvNome = sel.value;
    const avvUtente = state.utenti.find(u=>u.nome_completo===avvNome);
    const respUtente = state.utenti.find(u=>u.nome_completo===respNome);
    const nomeDipInput = document.getElementById(`nomeDip_${respId}`);
    const nomeDip = nomeDipInput?.value || state.dipartimenti.find(d=>d.responsabile===respNome)?.nome_dipartimento || '';
    await saveDipartimento(respNome, respUtente?.id||null, avvNome, avvUtente?.id||null, nomeDip);
    showSuccess(`${avvNome} aggiunto al dipartimento di ${respNome}`);
    render();
}

async function confirmDeleteDip(id) {
    if (confirm('Rimuovere questo avvocato dal dipartimento?')) {
        await deleteDipartimento(id);
        showSuccess('Avvocato rimosso dal dipartimento.');
        render();
    }
}

async function submitPratica() {
    const f=state.formData;
    const orig=state.editingPratica;
    const isNuova=!orig;
    if (!f.cliente||!f.descrizione||!f.avvocato) { alert('Compila tutti i campi obbligatori (*)'); return; }
    if (!isAdmin()&&!isResp()&&!isNuova) {
        if (f.scadenza&&orig.scadenza&&f.scadenza<orig.scadenza) { alert('⚠️ Non puoi retrodatare la scadenza!'); return; }
        if (f.data_aggiornamento_attivita&&orig.data_aggiornamento_attivita&&f.data_aggiornamento_attivita<orig.data_aggiornamento_attivita) { alert('⚠️ Non puoi retrodatare l\'aggiornamento!'); return; }
        f.data_apertura = orig.data_apertura;
    }
    const p={...f};
    if (orig) p.id=orig.id;
    p.data_modifica=today(); p.data_aggiornamento_attivita=today();
    const ok=await savePratica(p);
    if (ok) {
        // Se la scadenza è stata spostata in avanti, cancella le notifiche relative
        if (orig && f.scadenza && f.scadenza > today()) {
            await cancellaNotificheScadenzaSpostata(orig.id, f.scadenza);
        }
        state.showModal=false; state.editingPratica=null; showSuccess('Pratica salvata!'); render();
    }
}

async function submitAvvocato() {
    const soloColore = !isAdmin()&&state.editingAvvocato;
    if (!soloColore&&(!state.avvForm.nome||!state.avvForm.cognome||!state.avvForm.email||!state.avvForm.telefono)) { alert('Compila tutti i campi'); return; }
    const a={...state.avvForm};
    if (state.editingAvvocato) a.id=state.editingAvvocato.id;
    const ok=await saveAvvocato(a);
    if (ok) { state.showAvvocatoModal=false; state.editingAvvocato=null; showSuccess('Avvocato aggiornato!'); render(); }
}

async function submitUtente() {
    if (!state.utenteForm.username||!state.utenteForm.nome_completo||!state.utenteForm.email) { alert('Compila tutti i campi'); return; }
    if (!state.editingUtente&&!state.utenteForm.password) { alert('Inserisci una password'); return; }
    const u={...state.utenteForm};
    if (state.editingUtente) u.id=state.editingUtente.id;
    u.attivo=true;
    const ok=await saveUtente(u);
    if (ok) { state.showUtenteModal=false; state.editingUtente=null; showSuccess('Utente salvato!'); render(); }
}

async function submitNota() {
    if (!state.noteForm.nota) { alert('Scrivi una nota!'); return; }
    const ok=await aggiungiNota(state.viewingPratica.id,state.noteForm.nota);
    if (ok) { state.noteForm={nota:''}; showSuccess('Nota aggiunta!'); render(); }
}

function confirmDeletePratica(id) { if(isAdmin()&&confirm('Eliminare questa pratica?')) deletePratica(id); }
function confirmDeleteAvvocato(id) { if(isAdmin()&&confirm('Eliminare questo avvocato?')) deleteAvvocato(id); }
function confirmDeleteUtente(id) { if(confirm('Eliminare questo utente?')) deleteUtente(id); }

render();
</script>
</body>
</html>
