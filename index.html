<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLS Studio Legale - Gestione Pratiche</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes fadeIn { from {opacity:0;transform:translateY(10px);} to {opacity:1;transform:translateY(0);}}
        @keyframes slideDown { from {opacity:0;transform:translateY(-20px);} to {opacity:1;transform:translateY(0);}}
        .animate-fadein { animation: fadeIn 0.3s; }
        .animate-slidedown { animation: slideDown 0.4s; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            .print-full { width: 100% !important; max-width: 100% !important; padding: 20px !important; }
        }
        .scaduta { background-color: #fee2e2 !important; border-left: 4px solid #dc2626 !important; }
        .priorita-bassa { background-color: #dbeafe; }
        .priorita-media { background-color: #3b82f6; color: white; }
        .priorita-alta { background-color: #1e3a8a; color: white; }
        .stato-svolgimento { background-color: #fef3c7; color: #92400e; }
        .stato-fatto { background-color: #d1fae5; color: #065f46; }
        .stato-bloccato { background-color: #fee2e2; color: #991b1b; }
        .pratica-fatto { opacity: 0.75; }
        .pratica-fatto h3 { text-decoration: line-through; text-decoration-color: #6b7280; text-decoration-thickness: 2px; }
        .pratica-fatto .desc-text { text-decoration: line-through; text-decoration-color: #9ca3af; }
        .avv-avatar { display:inline-flex;align-items:center;justify-content:center;width:2.2rem;height:2.2rem;border-radius:50%;font-size:0.65rem;font-weight:700;color:white;flex-shrink:0;letter-spacing:0.03em; }
        .avv-avatar-lg { display:inline-flex;align-items:center;justify-content:center;width:3rem;height:3rem;border-radius:50%;font-size:0.8rem;font-weight:700;color:white;flex-shrink:0; }
    </style>
</head>
<body>
<div id="app" class="min-h-screen bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 flex items-center justify-center">
    <div class="text-white text-center">
        <img src="https://i.postimg.cc/63h6w5x4/2026_02_18_12_20_55_slslegal_it.png" alt="SLS Studio Legale" class="w-72 h-72 mx-auto mb-4 object-contain animate-pulse">
        <p class="text-xl">Caricamento...</p>
    </div>
</div>
<script>
const SUPABASE_URL = 'https://vwfubfydakocuxhepwkq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ziNieyV1K_9bPBNJu6GHUQ_j2kVEyn2';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TIPI_PRATICA = ['civile','penale','amministrativo','lavoro','famiglia','tributario'];
const AUTORITA = ['Tribunale','CGT1','CGT2','Mediazione','Cassazione','Corte d\'Appello','Stragiudiziale'];
const AVV_COLORS = ['#4f46e5','#7c3aed','#db2777','#059669','#d97706','#dc2626','#0891b2','#65a30d','#9333ea','#c2410c'];
const avvColorMap = {};

function getAvvColor(nome) {
    if (!nome) return '#6b7280';
    if (!avvColorMap[nome]) {
        let h = 0;
        for (let i = 0; i < nome.length; i++) h = nome.charCodeAt(i) + ((h<<5)-h);
        avvColorMap[nome] = AVV_COLORS[Math.abs(h) % AVV_COLORS.length];
    }
    return avvColorMap[nome];
}
function getIniziali(nome) {
    if (!nome) return '?';
    return nome.split(' ').filter(Boolean).map(n=>n[0]).join('').toUpperCase().slice(0,3);
}
function avvAvatar(nome, lg=false) {
    return `<span class="${lg?'avv-avatar-lg':'avv-avatar'}" style="background:${getAvvColor(nome)}" title="${nome||''}">${getIniziali(nome)}</span>`;
}

let state = {
    user:null, activeTab:'dashboard', viewMode:'cards',
    pratiche:[], avvocati:[], utenti:[], noteAggiornamento:[], alertStorico:[],
    searchTerm:'', filterStato:'tutti', filterTipo:'tutti', filterPriorita:'tutti', filterAvvocato:'tutti',
    showModal:false, showAvvocatoModal:false, showUtenteModal:false, showNoteModal:false, showAlertModal:false,
    editingPratica:null, editingAvvocato:null, editingUtente:null, viewingPratica:null,
    alertList:[], successMessage:'',
    formData:{ cliente:'', tipo_pratica:'civile', autorita:'', descrizione:'', stato:'svolgimento',
        data_apertura:today(), data_aggiornamento_attivita:today(), scadenza:'', timeline:'',
        priorita:'media', rgnr:'', avvocato:'', nota_aggiornamento:'', alert_giorni:'1' },
    avvForm:{ nome:'', cognome:'', email:'', telefono:'', specializzazione:'civile' },
    utenteForm:{ username:'', password:'', nome_completo:'', email:'', ruolo:'avvocato' },
    noteForm:{ nota:'' }
};

function today() { return new Date().toISOString().split('T')[0]; }
function isAdmin() { return state.user?.username === 'admin'; }

function isPraticaScaduta(p) {
    if (!p.scadenza || p.stato==='fatto') return false;
    return new Date(p.scadenza) < new Date(today()) && p.stato==='svolgimento';
}
function isPraticaInScadenza(p) {
    if (!p.scadenza || p.stato==='fatto' || !p.alert_giorni) return false;
    const giorni = p.alert_giorni==='1' ? 3 : 10;
    const diff = (new Date(p.scadenza) - new Date()) / (1000*60*60*24);
    return diff > 0 && diff <= giorni;
}

// Validazione date per non-admin
function validaDataAvanti(nuovaData, dataAttuale) {
    if (!nuovaData) return true;
    if (!dataAttuale) return true;
    return nuovaData >= dataAttuale;
}

function checkAlertGiornaliero() {
    const lastCheck = localStorage.getItem('sls_last_alert_check');
    if (lastCheck === today()) return;
    localStorage.setItem('sls_last_alert_check', today());
    eseguiCheckAlert();
}

function eseguiCheckAlert() {
    const alerts = [];
    state.pratiche.forEach(p => {
        if (!p.scadenza || p.stato==='fatto') return;
        const diff = Math.ceil((new Date(p.scadenza) - new Date()) / (1000*60*60*24));
        // Alert scadenza imminente
        if (p.alert_giorni) {
            const giorni = p.alert_giorni==='1' ? 3 : 10;
            if (diff > 0 && diff <= giorni) {
                if (isAdmin() || state.user?.nome_completo === p.avvocato)
                    alerts.push({ pratica:p, diff, tipo:'imminente' });
            }
        }
        // Alert scadenza già passata
        if (diff <= 0 && p.stato==='svolgimento') {
            if (isAdmin() || state.user?.nome_completo === p.avvocato)
                alerts.push({ pratica:p, diff, tipo:'scaduta' });
        }
    });
    if (alerts.length > 0) {
        state.alertList = alerts;
        state.showAlertModal = true;
        // Salva nello storico alert
        salvaStorico(alerts);
    }
}

function salvaStorico(alerts) {
    const key = `sls_alert_storico_${state.user?.id}`;
    let storico = [];
    try { storico = JSON.parse(localStorage.getItem(key)||'[]'); } catch(e){}
    alerts.forEach(a => {
        storico.unshift({
            data: today(),
            cliente: a.pratica.cliente,
            scadenza: a.pratica.scadenza,
            avvocato: a.pratica.avvocato,
            tipo: a.tipo,
            diff: a.diff
        });
    });
    // Mantieni solo gli ultimi 50
    storico = storico.slice(0, 50);
    localStorage.setItem(key, JSON.stringify(storico));
}

function getStorico(avvocatoId) {
    const key = `sls_alert_storico_${avvocatoId}`;
    try { return JSON.parse(localStorage.getItem(key)||'[]'); } catch(e){ return []; }
}

async function loadAll() {
    await Promise.all([loadPratiche(), loadAvvocati(), loadUtenti()]);
}
async function loadPratiche() {
    const { data, error } = await sb.from('pratiche').select('*').order('numero',{ascending:false});
    if (!error) state.pratiche = data||[];
}
async function loadAvvocati() {
    const { data, error } = await sb.from('avvocati').select('*').order('cognome');
    if (!error) state.avvocati = data||[];
}
async function loadUtenti() {
    const { data, error } = await sb.from('utenti').select('*').order('nome_completo');
    if (!error) state.utenti = data||[];
}
async function loadNote(praticaId) {
    const { data, error } = await sb.from('note_aggiornamento').select('*')
        .eq('pratica_id', praticaId).order('data_nota',{ascending:false});
    if (!error) state.noteAggiornamento = data||[];
}

function cleanPratica(p) {
    const c = {...p};
    ['timeline','scadenza','data_modifica','nota_aggiornamento','rgnr','autorita'].forEach(k => {
        if (!c[k]||c[k]==='') c[k]=null;
    });
    if (!c.data_aggiornamento_attivita) c.data_aggiornamento_attivita = today();
    return c;
}

async function savePratica(p) {
    try {
        const cp = cleanPratica(p);
        let praticaId;
        if (cp.id) {
            const { error } = await sb.from('pratiche').update(cp).eq('id',cp.id);
            if (error) throw error;
            praticaId = cp.id;
        } else {
            cp.numero = Date.now(); cp.data_modifica = today();
            const { data, error } = await sb.from('pratiche').insert([cp]).select().single();
            if (error) throw error;
            praticaId = data.id;
        }
        if (p.nota_aggiornamento?.trim()) {
            await sb.from('note_aggiornamento').insert([{
                pratica_id:praticaId, data_nota:today(),
                nota:p.nota_aggiornamento.trim(),
                autore:state.user.nome_completo, autore_id:state.user.id
            }]);
        }
        await loadPratiche(); return true;
    } catch(e) { alert('Errore: '+e.message); return false; }
}

async function aggiungiNota(praticaId, nota) {
    try {
        const { error } = await sb.from('note_aggiornamento').insert([{
            pratica_id:praticaId, data_nota:today(), nota,
            autore:state.user.nome_completo, autore_id:state.user.id
        }]);
        if (error) throw error;
        await loadNote(praticaId); return true;
    } catch(e) { alert('Errore: '+e.message); return false; }
}

async function deletePratica(id) {
    if (!isAdmin()) { alert('Solo admin può eliminare pratiche'); return; }
    const { error } = await sb.from('pratiche').delete().eq('id',id);
    if (!error) { await loadPratiche(); showSuccess('Pratica eliminata!'); }
    else alert('Errore: '+error.message);
}

async function saveAvvocato(avv) {
    try {
        avv.nome_completo = avv.nome+' '+avv.cognome;
        if (avv.id) {
            const { error } = await sb.from('avvocati').update(avv).eq('id',avv.id);
            if (error) throw error;
        } else {
            avv.data_creazione = today();
            const { error } = await sb.from('avvocati').insert([avv]);
            if (error) throw error;
        }
        await loadAvvocati(); return true;
    } catch(e) { alert('Errore: '+e.message); return false; }
}

async function deleteAvvocato(id) {
    if (!isAdmin()) { alert('Solo admin può eliminare avvocati'); return; }
    const nome = state.avvocati.find(a=>a.id===id)?.nome_completo;
    if (state.pratiche.filter(p=>p.avvocato===nome).length>0) {
        alert('Impossibile eliminare: ci sono pratiche assegnate!'); return;
    }
    const { error } = await sb.from('avvocati').delete().eq('id',id);
    if (!error) { await loadAvvocati(); showSuccess('Avvocato eliminato!'); }
    else alert('Errore: '+error.message);
}

async function saveUtente(u) {
    try {
        if (u.id) {
            const upd={...u}; if (!upd.password||upd.password==='') delete upd.password;
            const { error } = await sb.from('utenti').update(upd).eq('id',u.id);
            if (error) throw error;
        } else {
            const { error } = await sb.from('utenti').insert([u]);
            if (error) throw error;
        }
        await loadUtenti(); return true;
    } catch(e) { alert('Errore: '+e.message); return false; }
}

async function deleteUtente(id) {
    if (id===state.user.id) { alert('Non puoi eliminare il tuo account!'); return; }
    const { error } = await sb.from('utenti').delete().eq('id',id);
    if (!error) { await loadUtenti(); showSuccess('Utente eliminato!'); }
    else alert('Errore: '+error.message);
}

async function login(username, password) {
    const { data, error } = await sb.from('utenti').select('*')
        .eq('username',username).eq('password',password).eq('attivo',true).single();
    if (error||!data) { alert('Username o password errati!'); return false; }
    state.user = data;
    await loadAll();
    checkAlertGiornaliero();
    eseguiCheckAlert();
    render(); return true;
}

function logout() { state.user=null; state.activeTab='dashboard'; render(); }

function esportaCSV(nomeFile, righe) {
    if (!righe||righe.length===0) { alert('Nessun dato!'); return; }
    const headers = Object.keys(righe[0]);
    const csv = [headers.join(';'), ...righe.map(r=>headers.map(h=>{
        const v=r[h]===null||r[h]===undefined?'':String(r[h]);
        return '"'+v.replace(/"/g,'""')+'"';
    }).join(';'))].join('\n');
    const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=nomeFile;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
}

async function esportaTuttiCSV() {
    const [note,utenti] = await Promise.all([
        sb.from('note_aggiornamento').select('*').order('data_nota',{ascending:false}),
        sb.from('utenti').select('id,username,nome_completo,email,ruolo,attivo')
    ]);
    esportaCSV(`pratiche-${today()}.csv`,state.pratiche);
    await new Promise(r=>setTimeout(r,300));
    esportaCSV(`avvocati-${today()}.csv`,state.avvocati);
    await new Promise(r=>setTimeout(r,300));
    if (!utenti.error&&utenti.data?.length) { esportaCSV(`utenti-${today()}.csv`,utenti.data); await new Promise(r=>setTimeout(r,300)); }
    if (!note.error&&note.data?.length) esportaCSV(`note-${today()}.csv`,note.data);
    showSuccess('CSV esportati!');
}

async function esportaDati() {
    const data={pratiche:state.pratiche,avvocati:state.avvocati,dataEsportazione:new Date().toISOString(),versione:'2.0'};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`sls-backup-${today()}.json`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    showSuccess('Backup JSON esportato!');
}

function importaDati(e) {
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=async(ev)=>{
        try {
            const data=JSON.parse(ev.target.result);
            if(!confirm(`Importare ${data.pratiche?.length||0} pratiche?`)) return;
            for(const a of (data.avvocati||[])) { delete a.id; delete a.created_at; await sb.from('avvocati').insert([a]); }
            for(const p of (data.pratiche||[])) { delete p.id; delete p.created_at; await sb.from('pratiche').insert([p]); }
            await loadAll(); showSuccess('Importati!');
        } catch(er) { alert('Errore: '+er.message); }
    };
    reader.readAsText(file); e.target.value='';
}

function stampa() { window.print(); }
function showSuccess(msg) {
    state.successMessage=msg; render();
    setTimeout(()=>{ state.successMessage=''; render(); },3000);
}

function getStatoBadge(s) { return {svolgimento:'stato-svolgimento',fatto:'stato-fatto',bloccato:'stato-bloccato'}[s]||'stato-svolgimento'; }
function getStatoIcon(s) { return s==='fatto'?'✅':s==='bloccato'?'🚫':'🔄'; }
function getPrioritaBadge(p) { return {bassa:'priorita-bassa',media:'priorita-media',alta:'priorita-alta'}[p]||'priorita-media'; }

function getAvvStats(nome) {
    const ps=state.pratiche.filter(p=>p.avvocato===nome);
    return {totali:ps.length,svolgimento:ps.filter(p=>p.stato==='svolgimento').length,
        fatto:ps.filter(p=>p.stato==='fatto').length,bloccato:ps.filter(p=>p.stato==='bloccato').length};
}

function getFiltered() {
    return state.pratiche.filter(p=>{
        const s=state.searchTerm.toLowerCase();
        const match=p.cliente.toLowerCase().includes(s)||p.descrizione.toLowerCase().includes(s)||(p.rgnr||'').toLowerCase().includes(s);
        return match&&(state.filterStato==='tutti'||p.stato===state.filterStato)&&
            (state.filterTipo==='tutti'||p.tipo_pratica===state.filterTipo)&&
            (state.filterPriorita==='tutti'||p.priorita===state.filterPriorita)&&
            (state.filterAvvocato==='tutti'||p.avvocato===state.filterAvvocato);
    });
}

function fmtDate(d) { return d?new Date(d).toLocaleDateString('it-IT'):''; }

function render() {
    if (!state.user) { renderLogin(); return; }
    const stats={
        totali:state.pratiche.length,
        svolgimento:state.pratiche.filter(p=>p.stato==='svolgimento').length,
        fatto:state.pratiche.filter(p=>p.stato==='fatto').length,
        bloccato:state.pratiche.filter(p=>p.stato==='bloccato').length,
        scadute:state.pratiche.filter(p=>isPraticaScaduta(p)).length,
        inScadenza:state.pratiche.filter(p=>isPraticaInScadenza(p)).length
    };
    const filtered=getFiltered();
    const tabs=[
        {id:'dashboard',label:'Dashboard',icon:'📊',show:true},
        {id:'pratiche',label:'Pratiche',icon:'📁',show:true},
        {id:'avvocati',label:'Avvocati',icon:'👥',show:true},
        {id:'utenti',label:'Utenti',icon:'🔐',show:isAdmin()},
        {id:'gestione',label:'Gestione Dati',icon:'🗄️',show:isAdmin()}
    ].filter(t=>t.show);

    document.getElementById('app').innerHTML=`
    <div class="max-w-7xl mx-auto p-4 w-full print-full">
        <div class="bg-white rounded-2xl shadow-2xl mb-6 overflow-hidden no-print">
            <div class="bg-gradient-to-r from-blue-900 to-indigo-800 text-white p-8 relative">
                <button onclick="logout()" class="px-6 py-3 bg-white/10 hover:bg-white/20 rounded-lg transition-all absolute top-8 right-8">🚪 Esci</button>
                <div class="text-center">
                    <h1 class="text-4xl font-bold mb-4">SLS Studio Legale</h1>
                    <img src="https://i.postimg.cc/63h6w5x4/2026_02_18_12_20_55_slslegal_it.png" alt="Logo SLS" class="w-[30rem] h-[30rem] mx-auto mb-4 object-contain">
                    <p class="text-blue-200 mb-2">Sistema di Gestione Pratiche</p>
                    <div class="bg-white/10 rounded-full px-4 py-2 inline-flex items-center gap-2">
                        <span class="text-sm">👤 ${state.user.nome_completo}</span>
                        <span class="text-white/50">|</span>
                        <span class="text-sm">${isAdmin()?'👑 Admin':'⚖️ Avvocato'}</span>
                    </div>
                </div>
            </div>
            <div class="flex bg-gray-50 border-b overflow-x-auto">
                ${tabs.map(t=>`
                    <button onclick="switchTab('${t.id}')" class="flex items-center gap-2 px-6 py-4 font-semibold transition-all whitespace-nowrap
                        ${state.activeTab===t.id?'bg-white text-indigo-600 border-b-4 border-indigo-600':'text-gray-600 hover:bg-gray-100'}">
                        ${t.icon} ${t.label}
                    </button>`).join('')}
                ${stats.inScadenza>0||stats.scadute>0?`
                <button onclick="state.showAlertModal=true;render()" class="ml-auto flex items-center gap-2 px-6 py-4 font-semibold text-orange-600 hover:bg-orange-50 whitespace-nowrap animate-pulse no-print">
                    🔔 ${stats.inScadenza+stats.scadute} alert
                </button>`:''}
            </div>
        </div>

        ${state.successMessage?`<div class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 rounded-lg mb-6 shadow-lg no-print"><p class="font-semibold">✅ ${state.successMessage}</p></div>`:''}

        ${state.activeTab==='dashboard'?renderDashboard(stats):''}
        ${state.activeTab==='pratiche'?renderPratiche(filtered):''}
        ${state.activeTab==='avvocati'?renderAvvocati():''}
        ${state.activeTab==='utenti'?renderUtenti():''}
        ${state.activeTab==='gestione'?renderGestione():''}

        ${state.showModal?renderModalPratica():''}
        ${state.showAvvocatoModal?renderModalAvvocato():''}
        ${state.showUtenteModal?renderModalUtente():''}
        ${state.showNoteModal?renderModalNote():''}
        ${state.showAlertModal?renderModalAlert():''}
    </div>`;
}

function renderLogin() {
    document.getElementById('app').innerHTML=`
    <div class="min-h-screen bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
            <div class="text-center mb-8">
                <img src="https://i.postimg.cc/63h6w5x4/2026_02_18_12_20_55_slslegal_it.png" alt="SLS" class="w-[28rem] h-[28rem] mx-auto mb-4 object-contain">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">SLS Studio Legale</h1>
                <p class="text-gray-600">Sistema di Gestione Pratiche</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                    <input type="text" id="loginUsername" class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-indigo-500 focus:outline-none" placeholder="Il tuo username"/>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>

async function submitPratica() {
    const f=state.formData;
    const orig=state.editingPratica;
    const isNuova=!orig;

    if (!f.cliente||!f.descrizione||!f.avvocato) { alert('Compila tutti i campi obbligatori (*)'); return; }

    // Validazione non-admin su date
    if (!isAdmin()&&!isNuova) {
        const scadenzaCambiata = f.scadenza && orig.scadenza && f.scadenza !== orig.scadenza;
        const aggCambiata = f.data_aggiornamento_attivita && orig.data_aggiornamento_attivita && f.data_aggiornamento_attivita !== orig.data_aggiornamento_attivita;

        // Controlla retrodatazione
        if (f.scadenza && orig.scadenza && f.scadenza < orig.scadenza) {
            alert('⚠️ Non puoi retrodatare la scadenza!'); return;
        }
        if (f.data_aggiornamento_attivita && orig.data_aggiornamento_attivita && f.data_aggiornamento_attivita < orig.data_aggiornamento_attivita) {
            alert('⚠️ Non puoi retrodatare l\'aggiornamento attività!'); return;
        }

        // Nota obbligatoria se hai modificato le date
        if ((scadenzaCambiata||aggCambiata) && !f.nota_aggiornamento?.trim()) {
            alert('⚠️ Devi inserire una nota di aggiornamento quando modifichi le date!'); return;
        }

        // Data apertura non modificabile
        f.data_apertura = orig.data_apertura;
    }

    const p={...f};
    if (orig) p.id=orig.id;
    p.data_modifica=today();
    p.data_aggiornamento_attivita=today();
    const ok=await savePratica(p);
    if (ok) { state.showModal=false; state.editingPratica=null; showSuccess('Pratica salvata!'); render(); }
}

async function submitAvvocato() {
    if (!state.avvForm.nome||!state.avvForm.cognome||!state.avvForm.email||!state.avvForm.telefono) { alert('Compila tutti i campi'); return; }
    const a={...state.avvForm};
    if (state.editingAvvocato) a.id=state.editingAvvocato.id;
    const ok=await saveAvvocato(a);
    if (ok) { state.showAvvocatoModal=false; state.editingAvvocato=null; showSuccess('Avvocato salvato!'); render(); }
}

async function submitUtente() {
    if (!state.utenteForm.username||!state.utenteForm.nome_completo||!state.utenteForm.email) { alert('Compila tutti i campi'); return; }
    if (!state.editingUtente&&!state.utenteForm.password) { alert('Inserisci una password'); return; }
    const u={...state.utenteForm};
    if (state.editingUtente) u.id=state.editingUtente.id;
    u.attivo=true;
    const ok=await saveUtente(u);
    if (ok) { state.showUtenteModal=false; state.editingUtente=null; showSuccess('Utente salvato!'); render(); }
}

async function submitNota() {
    if (!state.noteForm.nota) { alert('Scrivi una nota!'); return; }
    const ok=await aggiungiNota(state.viewingPratica.id,state.noteForm.nota);
    if (ok) { state.noteForm={nota:''}; showSuccess('Nota aggiunta!'); render(); }
}

function confirmDeletePratica(id) { if(isAdmin()&&confirm('Eliminare questa pratica?')) deletePratica(id); }
function confirmDeleteAvvocato(id) { if(isAdmin()&&confirm('Eliminare questo avvocato?')) deleteAvvocato(id); }
function confirmDeleteUtente(id) { if(confirm('Eliminare questo utente?')) deleteUtente(id); }

render();
</script>
</body>
</html>
