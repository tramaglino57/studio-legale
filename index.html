!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLS Studio Legale - Gestione Pratiche</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        * { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body { background: #f3f4f6; }
        @keyframes fadeIn { from {opacity:0;transform:translateY(10px);} to {opacity:1;transform:translateY(0);}}
        @keyframes slideDown { from {opacity:0;transform:translateY(-20px);} to {opacity:1;transform:translateY(0);}}
        .animate-fadein { animation: fadeIn 0.3s; }
        .animate-slidedown { animation: slideDown 0.4s; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
        }
        .sls-card { background:#fff; border-radius:16px; box-shadow:0 1px 4px rgba(0,0,0,0.06); transition:box-shadow 0.2s, transform 0.2s; }
        .sls-card:hover { box-shadow:0 6px 20px rgba(147,51,234,0.13); transform:translateY(-1px); }
        .purple-icon { background:linear-gradient(135deg,#c084fc 0%,#a855f7 50%,#9333ea 100%); border-radius:14px; display:flex;align-items:center;justify-content:center; box-shadow:0 4px 12px rgba(147,51,234,0.35); flex-shrink:0; }
        .btn-purple { background:linear-gradient(135deg,#c084fc 0%,#a855f7 50%,#9333ea 100%); color:#fff; border:none; border-radius:12px; font-weight:600; cursor:pointer; transition:opacity 0.2s, transform 0.15s; box-shadow:0 4px 14px rgba(147,51,234,0.3); }
        .btn-purple:hover { opacity:0.92; transform:scale(1.02); }
        .btn-white { background:#fff; border:2px solid #e5e7eb; border-radius:12px; font-weight:600; cursor:pointer; transition:border-color 0.15s; color:#374151; }
        .btn-white:hover { border-color:#a855f7; }
        .btn-danger { background:#ef4444; color:#fff; border:none; border-radius:10px; font-weight:600; cursor:pointer; }
        .btn-danger:hover { background:#dc2626; }
        .btn-green { background:#10b981; color:#fff; border:none; border-radius:10px; font-weight:600; cursor:pointer; }
        .btn-green:hover { background:#059669; }
        .nav-tab { display:flex;align-items:center;gap:8px;padding:12px 20px;font-weight:600;font-size:14px;transition:all 0.2s;white-space:nowrap;border:none;background:none;cursor:pointer; }
        .nav-tab.active { background:#fff;color:#9333ea;border-bottom:3px solid #9333ea; }
        .nav-tab.inactive { color:#6b7280; }
        .nav-tab.inactive:hover { background:#f3e8ff;color:#9333ea; }
        .badge { display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600; }
        .badge-svolgimento { background:#f3e8ff;color:#7c3aed; }
        .badge-fatto { background:#dcfce7;color:#16a34a; }
        .badge-bloccato { background:#fee2e2;color:#dc2626; }
        .badge-bassa { background:#dbeafe;color:#1d4ed8; }
        .badge-media { background:#a855f7;color:#fff; }
        .badge-alta { background:#1e3a8a;color:#fff; }
        .sls-input { width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:12px;font-size:14px;outline:none;transition:border-color 0.2s;font-family:inherit; }
        .sls-input:focus { border-color:#a855f7; }
        .pratica-fatto-card { opacity:0.6;position:relative;overflow:hidden; }
        .pratica-fatto-card::after { content:'';position:absolute;left:0;right:0;top:50%;height:3px;background:linear-gradient(90deg,#6366f1,#a855f7,#ec4899);transform:translateY(-50%);pointer-events:none;z-index:10; }
        .fatto-strike { text-decoration:line-through;text-decoration-color:#a855f7;text-decoration-thickness:2px;opacity:0.7; }
        .tr-fatto td { opacity:0.55;position:relative; }
        .tr-fatto td::after { content:'';position:absolute;left:0;right:0;top:50%;height:2px;background:linear-gradient(90deg,#6366f1,#a855f7,#ec4899);pointer-events:none; }
        .scaduta { background:#fee2e2!important;border-left:4px solid #dc2626!important; }
        .avv-avatar { display:inline-flex;align-items:center;justify-content:center;width:2.2rem;height:2.2rem;border-radius:50%;font-size:0.65rem;font-weight:700;color:white;flex-shrink:0; }
        .avv-avatar-lg { display:inline-flex;align-items:center;justify-content:center;width:3rem;height:3rem;border-radius:50%;font-size:0.8rem;font-weight:700;color:white;flex-shrink:0; }
        .color-swatch { width:2rem;height:2rem;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 2px #e5e7eb;cursor:pointer;transition:transform 0.15s; }
        .color-swatch:hover { transform:scale(1.2); }
        .color-swatch.selected { box-shadow:0 0 0 3px #9333ea;transform:scale(1.15); }
        .sls-modal { background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.18);max-width:720px;width:100%; }
        .sls-modal-header { background:linear-gradient(135deg,#9b59b6 0%,#8e44ad 50%,#7b2d8e 100%);border-radius:20px 20px 0 0;padding:24px 28px;display:flex;justify-content:space-between;align-items:center; }
        .sls-modal-close { background:rgba(255,255,255,0.15);border:none;border-radius:50%;width:36px;height:36px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s; }
        .sls-modal-close:hover { background:rgba(255,255,255,0.3); }
        .section-title { font-size:17px;font-weight:700;color:#111;margin:0 0 12px; }
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:#f1f1f1;border-radius:3px; }
        ::-webkit-scrollbar-thumb { background:#c084fc;border-radius:3px; }
        .sls-logo-img { object-fit:contain; display:block; }
    </style>
</head>

const TIPI_PRATICA = ['civile','penale','amministrativo','lavoro','famiglia','tributario'];
const AUTORITA = ['Tribunale','CGT1','CGT2','Mediazione','Cassazione','Corte d\'Appello','Stragiudiziale'];
const PALETTE_COLORI = ['#4f46e5','#7c3aed','#db2777','#059669','#d97706','#dc2626','#0891b2','#65a30d','#9333ea','#c2410c','#0ea5e9','#14b8a6','#f59e0b','#ef4444','#8b5cf6','#10b981','#f97316','#6366f1','#ec4899','#84cc16'];
const avvColorMap = {};

function getAvvColor(nome) {
    if (!nome) return '#6b7280';
    const avv = state.avvocati.find(a => a.nome_completo === nome);
    if (avv && avv.colore) return avv.colore;
    if (!avvColorMap[nome]) {
        let h = 0;
        for (let i = 0; i < nome.length; i++) h = nome.charCodeAt(i) + ((h<<5)-h);
        avvColorMap[nome] = PALETTE_COLORI[Math.abs(h) % PALETTE_COLORI.length];
    }
    return avvColorMap[nome];
}
function getIniziali(nome) {
    if (!nome) return '?';
    return nome.split(' ').filter(Boolean).map(n=>n[0]).join('').toUpperCase().slice(0,3);
}
function avvAvatar(nome, lg=false) {
    return `<span class="${lg?'avv-avatar-lg':'avv-avatar'}" style="background:${getAvvColor(nome)}" title="${nome||''}">${getIniziali(nome)}</span>`;
}
function isAdmin() { return state.user?.username === 'admin'; }
function isResp() { return state.user?.ruolo === 'responsabile_dipartimento'; }
function myAvvocati() {
    if (isAdmin()) return state.avvocati.map(a=>a.nome_completo);
    if (isResp()) return state.dipartimenti.filter(d=>d.responsabile===state.user.nome_completo).map(d=>d.avvocato);
    return [state.user.nome_completo];
}

let state = {
    user:null, activeTab:'dashboard', viewMode:'cards',
    pratiche:[], avvocati:[], utenti:[], noteAggiornamento:[], dipartimenti:[],
    searchTerm:'', filterStato:'tutti', filterTipo:'tutti', filterPriorita:'tutti', filterAvvocato:'tutti',
    showModal:false, showAvvocatoModal:false, showUtenteModal:false, showNoteModal:false,
    showAlertModal:false, showDettaglioPratica:false,
    editingPratica:null, editingAvvocato:null, editingUtente:null, viewingPratica:null,
    alertList:[], successMessage:'',
    formData:{ cliente:'', tipo_pratica:'civile', autorita:'', descrizione:'', stato:'svolgimento',
        data_apertura:today(), data_aggiornamento_attivita:today(), scadenza:'', timeline:'',
        priorita:'media', rgnr:'', avvocato:'', nota_aggiornamento:'', alert_giorni:'1', responsabile_dipartimento:'' },
    avvForm:{ nome:'', cognome:'', email:'', telefono:'', specializzazione:'civile', colore:'#9333ea' },
    utenteForm:{ username:'', password:'', nome_completo:'', email:'', ruolo:'avvocato' },
    noteForm:{ nota:'' },
    notifiche:[], notificheLoading:false
};

function today() { return new Date().toISOString().split('T')[0]; }
function isPraticaScaduta(p) {
    if (!p.scadenza || p.stato==='fatto') return false;
    return new Date(p.scadenza) < new Date(today()) && p.stato==='svolgimento';
}
function isPraticaInScadenza(p) {
    if (!p.scadenza || p.stato==='fatto' || !p.alert_giorni) return false;
    const giorni = p.alert_giorni==='1' ? 3 : 10;
    const diff = (new Date(p.scadenza) - new Date()) / (1000*60*60*24);
    return diff > 0 && diff <= giorni;
}
function checkAlertGiornaliero() {
    const lastCheck = localStorage.getItem('sls_last_alert_check');
    if (lastCheck === today()) return;
    localStorage.setItem('sls_last_alert_check', today());
    eseguiCheckAlert();
}
function eseguiCheckAlert() {
    const alerts = [];
    const myAvv = myAvvocati();
    state.pratiche.forEach(p => {
        if (!p.scadenza || p.stato==='fatto') return;
        if (!isAdmin() && !myAvv.includes(p.avvocato)) return;
        const diff = Math.ceil((new Date(p.scadenza) - new Date()) / (1000*60*60*24));
        if (p.alert_giorni) {
            const giorni = p.alert_giorni==='1' ? 3 : 10;
            if (diff > 0 && diff <= giorni) alerts.push({ pratica:p, diff, tipo:'imminente' });
        }
        if (diff <= 0 && p.stato==='svolgimento') alerts.push({ pratica:p, diff, tipo:'scaduta' });
    });
    if (alerts.length > 0) { state.alertList = alerts; state.showAlertModal = true; salvaStorico(alerts); }
}
async function salvaStorico(alerts) {
    for (const a of alerts) {
        const utente = state.utenti.find(u => u.nome_completo === a.pratica.avvocato);
        await sb.from('alert_storico').insert([{ data_alert: today(), pratica_id: a.pratica.id, cliente: a.pratica.cliente, scadenza: a.pratica.scadenza, avvocato: a.pratica.avvocato, avvocato_id: utente?.id || null, tipo: a.tipo, diff_giorni: a.diff }]);
    }
}
async function loadAll() { await Promise.all([loadPratiche(), loadAvvocati(), loadUtenti(), loadDipartimenti()]); }
async function loadPratiche() { const {data,error}=await sb.from('pratiche').select('*').order('numero',{ascending:false}); if(!error) state.pratiche=data||[]; }
async function loadAvvocati() { const {data,error}=await sb.from('avvocati').select('*').order('cognome'); if(!error) state.avvocati=data||[]; }
async function loadUtenti() { const {data,error}=await sb.from('utenti').select('*').order('nome_completo'); if(!error) state.utenti=data||[]; }
async function loadDipartimenti() { const {data,error}=await sb.from('dipartimenti').select('*'); if(!error) state.dipartimenti=data||[]; }
async function loadNote(praticaId) { const {data,error}=await sb.from('note_aggiornamento').select('*').eq('pratica_id',praticaId).order('data_nota',{ascending:false}); if(!error) state.noteAggiornamento=data||[]; }
async function loadNotifiche() {
    state.notificheLoading = true;
    let query = sb.from('alert_storico').select('*').eq('cancellata',false).order('data_alert',{ascending:false});
    if (!isAdmin()) { const myAvv = myAvvocati(); if (myAvv.length===1) query=query.eq('avvocato',myAvv[0]); else if (myAvv.length>1) query=query.in('avvocato',myAvv); }const {data,error} = await query; state.notifiche = error?[]:(data||[]);
}
async function cancellaNotifica(id) { await sb.from('alert_storico').update({cancellata:true}).eq('id',id); state.notifiche = state.notifiche.filter(n=>n.id!==id); render(); }
async function cancellaNotificheScadenzaSpostata(praticaId, nuovaScadenza) { if (!nuovaScadenza || nuovaScadenza <= today()) return; await sb.from('alert_storico').update({cancellata:true}).eq('pratica_id',praticaId).in('tipo',['scaduta','imminente']); }
function getPraticheVisibili() { if (isAdmin()) return state.pratiche; const myAvv = myAvvocati(); return state.pratiche.filter(p=>myAvv.includes(p.avvocato)); }
function cleanPratica(p) {
    const c={...p};
    ['timeline','scadenza','data_modifica','nota_aggiornamento','rgnr','autorita','responsabile_dipartimento'].forEach(k=>{if(!c[k]||c[k]==='')c[k]=null;});
    if(!c.data_aggiornamento_attivita) c.data_aggiornamento_attivita=today(); return c;
}
async function savePratica(p) {
    try { const cp=cleanPratica(p); let praticaId;
        if(cp.id){const{error}=await sb.from('pratiche').update(cp).eq('id',cp.id);if(error)throw error;praticaId=cp.id;}
        else{cp.numero=Date.now();cp.data_modifica=today();const{data,error}=await sb.from('pratiche').insert([cp]).select().single();if(error)throw error;praticaId=data.id;}
        if(p.nota_aggiornamento?.trim()) await sb.from('note_aggiornamento').insert([{pratica_id:praticaId,data_nota:today(),nota:p.nota_aggiornamento.trim(),autore:state.user.nome_completo,autore_id:state.user.id}]);
        await loadPratiche(); return true;
    }catch(e){alert('Errore: '+e.message);return false;}
}
async function aggiungiNota(praticaId,nota) { try{const{error}=await sb.from('note_aggiornamento').insert([{pratica_id:praticaId,data_nota:today(),nota,autore:state.user.nome_completo,autore_id:state.user.id}]);if(error)throw error;await loadNote(praticaId);return true;}catch(e){alert('Errore: '+e.message);return false;} }
async function deletePratica(id) { if(!isAdmin()){alert('Solo admin può eliminare pratiche');return;} const{error}=await sb.from('pratiche').delete().eq('id',id); if(!error){await loadPratiche();showSuccess('Pratica eliminata!');}else alert('Errore: '+error.message); }
async function saveAvvocato(avv) { try{avv.nome_completo=avv.nome+' '+avv.cognome;if(avv.id){const{error}=await sb.from('avvocati').update(avv).eq('id',avv.id);if(error)throw error;}else{avv.data_creazione=today();const{error}=await sb.from('avvocati').insert([avv]);if(error)throw error;}await loadAvvocati();return true;}catch(e){alert('Errore: '+e.message);return false;} }
async function deleteAvvocato(id) { if(!isAdmin()){alert('Solo admin');return;} const nome=state.avvocati.find(a=>a.id===id)?.nome_completo; if(state.pratiche.filter(p=>p.avvocato===nome).length>0){alert('Impossibile: ci sono pratiche assegnate!');return;} const{error}=await sb.from('avvocati').delete().eq('id',id); if(!error){await loadAvvocati();showSuccess('Avvocato eliminato!');}else alert('Errore: '+error.message); }
async function saveUtente(u) { try{if(u.id){const upd={...u};if(!upd.password||upd.password==='')delete upd.password;const{error}=await sb.from('utenti').update(upd).eq('id',u.id);if(error)throw error;}else{const{error}=await sb.from('utenti').insert([u]);if(error)throw error;}await loadUtenti();return true;}catch(e){alert('Errore: '+e.message);return false;} }
async function deleteUtente(id) { if(id===state.user.id){alert('Non puoi eliminare il tuo account!');return;} const{error}=await sb.from('utenti').delete().eq('id',id); if(!error){await loadUtenti();showSuccess('Utente eliminato!');}else alert('Errore: '+error.message); }
async function saveDipartimento(responsabile,responsabileId,avvocato,avvocatoId,nomeDip) { const exists=state.dipartimenti.find(d=>d.responsabile===responsabile&&d.avvocato===avvocato); if(exists)return; await sb.from('dipartimenti').insert([{responsabile,responsabile_id:responsabileId,avvocato,avvocato_id:avvocatoId,nome_dipartimento:nomeDip||null}]); await loadDipartimenti(); }
async function deleteDipartimento(id) { await sb.from('dipartimenti').delete().eq('id',id); await loadDipartimenti(); }
async function aggiornaNomeDip(responsabile,nomeDip) { await sb.from('dipartimenti').update({nome_dipartimento:nomeDip}).eq('responsabile',responsabile); await loadDipartimenti(); showSuccess('Nome dipartimento aggiornato!'); render(); }
async function login(username,password) { const{data,error}=await sb.from('utenti').select('*').eq('username',username).eq('password',password).eq('attivo',true).single(); if(error||!data){alert('Username o password errati!');return false;} state.user=data; await loadAll(); checkAlertGiornaliero(); eseguiCheckAlert(); render(); return true; }
function logout(){state.user=null;state.activeTab='dashboard';render();}
function esportaCSV(nomeFile,righe) { if(!righe||righe.length===0){alert('Nessun dato!');return;} const headers=Object.keys(righe[0]); const csv=[headers.join(';'),...righe.map(r=>headers.map(h=>{const v=r[h]===null||r[h]===undefined?'':String(r[h]);return '"'+v.replace(/"/g,'""')+'"';}).join(';'))].join('\n'); const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}); const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=nomeFile;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url); }
async function esportaTuttiCSV() { const[note,utenti]=await Promise.all([sb.from('note_aggiornamento').select('*').order('data_nota',{ascending:false}),sb.from('utenti').select('id,username,nome_completo,email,ruolo,attivo')]); esportaCSV(`pratiche-${today()}.csv`,state.pratiche);await new Promise(r=>setTimeout(r,300)); esportaCSV(`avvocati-${today()}.csv`,state.avvocati);await new Promise(r=>setTimeout(r,300)); if(!utenti.error&&utenti.data?.length){esportaCSV(`utenti-${today()}.csv`,utenti.data);await new Promise(r=>setTimeout(r,300));} if(!note.error&&note.data?.length)esportaCSV(`note-${today()}.csv`,note.data); showSuccess('CSV esportati!'); }
async function esportaDati() { const data={pratiche:state.pratiche,avvocati:state.avvocati,dataEsportazione:new Date().toISOString(),versione:'4.0'}; const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`sls-backup-${today()}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url); showSuccess('Backup JSON esportato!'); }
function importaDati(e) { const file=e.target.files[0];if(!file)return; const reader=new FileReader(); reader.onload=async(ev)=>{try{const data=JSON.parse(ev.target.result);if(!confirm(`Importare ${data.pratiche?.length||0} pratiche?`))return;for(const a of(data.avvocati||[])){delete a.id;delete a.created_at;await sb.from('avvocati').insert([a]);}for(const p of(data.pratiche||[])){delete p.id;delete p.created_at;await sb.from('pratiche').insert([p]);}await loadAll();showSuccess('Importati!');}catch(er){alert('Errore: '+er.message);}}; reader.readAsText(file);e.target.value=''; }
function stampa(){window.print();}
function showSuccess(msg){state.successMessage=msg;render();setTimeout(()=>{state.successMessage='';render();},3000);}
function fmtDate(d){return d?new Date(d).toLocaleDateString('it-IT'):'';}
function getRuoloBadge(r){ if(r==='amministratore'||r==='admin')return{label:'👑 Admin',cls:'color:#9333ea'}; if(r==='responsabile_dipartimento')return{label:'🏢 Resp. Dipartimento',cls:'color:#7c3aed'}; return{label:'⚖️ Avvocato',cls:'color:#6b7280'}; }
function getStatoBadge(s){return{svolgimento:'badge badge-svolgimento',fatto:'badge badge-fatto',bloccato:'badge badge-bloccato'}[s]||'badge badge-svolgimento';}
function getStatoIcon(s){return s==='fatto'?'✅':s==='bloccato'?'🚫':'🔄';}
function getPrioritaBadge(p){return{bassa:'badge badge-bassa',media:'badge badge-media',alta:'badge badge-alta'}[p]||'badge badge-media';}
function getAvvStats(nome){ const ps=state.pratiche.filter(p=>p.avvocato===nome); return{totali:ps.length,svolgimento:ps.filter(p=>p.stato==='svolgimento').length,fatto:ps.filter(p=>p.stato==='fatto').length,bloccato:ps.filter(p=>p.stato==='bloccato').length}; }
function getFiltered(){ const visibili=getPraticheVisibili(); return visibili.filter(p=>{ const s=state.searchTerm.toLowerCase(); const match=p.cliente.toLowerCase().includes(s)||p.descrizione.toLowerCase().includes(s)||(p.rgnr||'').toLowerCase().includes(s); return match&&(state.filterStato==='tutti'||p.stato===state.filterStato)&&(state.filterTipo==='tutti'||p.tipo_pratica===state.filterTipo)&&(state.filterPriorita==='tutti'||p.priorita===state.filterPriorita)&&(state.filterAvvocato==='tutti'||p.avvocato===state.filterAvvocato); }); }

// ── RENDER ────────────────────────────────────────────────

    if(!state.user){renderLogin();return;}
    const visibili=getPraticheVisibili();
    const stats={totali:visibili.length,svolgimento:visibili.filter(p=>p.stato==='svolgimento').length,fatto:visibili.filter(p=>p.stato==='fatto').length,bloccato:visibili.filter(p=>p.stato==='bloccato').length,scadute:visibili.filter(p=>isPraticaScaduta(p)).length,inScadenza:visibili.filter(p=>isPraticaInScadenza(p)).length};
    const filtered=getFiltered();
    const tabs=[{id:'dashboard',label:'Dashboard',icon:'📊',show:true},{id:'pratiche',label:'Pratiche',icon:'📁',show:true},{id:'avvocati',label:'Avvocati',icon:'👥',show:true},{id:'utenti',label:'Utenti',icon:'🔐',show:isAdmin()},{id:'dipartimenti',label:'Dipartimenti',icon:'🏢',show:isAdmin()},{id:'gestione',label:'Gestione Dati',icon:'🗄️',show:isAdmin()},{id:'notifiche',label:'Notifiche',icon:'🔔',show:true}].filter(t=>t.show);

    document.getElementById('app').innerHTML=`
    <div style="max-width:1400px;margin:0 auto;width:100%;">
        <header style="background:#fff;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:20;box-shadow:0 1px 4px rgba(0,0,0,0.05);" class="no-print">
            <div style="display:flex;align-items:center;gap:14px;">
                <img src="${SLS_LOGO_SMALL}" alt="SLS" class="sls-logo-img" style="width:44px;height:44px;border-radius:12px;"/>
                <div>
                    <div style="font-size:17px;font-weight:700;color:#111;line-height:1.2;">SLS Studio Legale</div>
                    <div style="font-size:12px;color:#9ca3af;font-weight:500;">Sistema di Gestione Pratiche</div>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;">
                <div style="display:flex;align-items:center;gap:8px;background:#f3e8ff;border-radius:20px;padding:6px 14px;">
                    ${avvAvatar(state.user.nome_completo)}
                    <span style="font-size:13px;font-weight:600;color:#7c3aed;">${state.user.nome_completo}</span>
                </div>
                <button onclick="logout()" class="btn-purple" style="padding:10px 18px;font-size:13px;display:flex;align-items:center;gap:6px;"><span>🚪</span> Esci</button>
            </div>
        </header>
        <nav style="background:#f9fafb;border-bottom:1px solid #e5e7eb;display:flex;overflow-x:auto;" class="no-print">
            ${tabs.map(t=>`<button onclick="switchTab('${t.id}')" class="nav-tab ${state.activeTab===t.id?'active':'inactive'}">${t.icon} ${t.label}</button>`).join('')}
            ${stats.inScadenza>0||stats.scadute>0?`<button onclick="state.showAlertModal=true;render()" style="margin-left:auto;display:flex;align-items:center;gap:6px;padding:12px 20px;font-weight:700;font-size:13px;color:#dc2626;background:none;border:none;cursor:pointer;white-space:nowrap;" class="no-print">🔔 ${stats.inScadenza+stats.scadute} alert</button>`:''}</nav>
        ${state.successMessage?`<div style="background:#dcfce7;border-left:4px solid #16a34a;color:#166534;padding:14px 20px;margin:16px 16px 0;border-radius:12px;font-weight:600;" class="no-print">✅ ${state.successMessage}</div>`:''}
        <main style="padding:24px 20px;">
            ${state.activeTab==='dashboard'?renderDashboard(stats):''}
            ${state.activeTab==='pratiche'?renderPratiche(filtered):''}
            ${state.activeTab==='avvocati'?'<div id="avvocatiContainer"><div style="text-align:center;padding:40px;color:#9ca3af;">Caricamento...</div></div>':''}
            ${state.activeTab==='utenti'?renderUtenti():''}
            ${state.activeTab==='dipartimenti'?renderDipartimenti():''}
            ${state.activeTab==='gestione'?renderGestione():''}
            ${state.activeTab==='notifiche'?renderNotifiche():''}
        </main>
        ${state.showModal?renderModalPratica():''}
        ${state.showAvvocatoModal?renderModalAvvocato():''}
        ${state.showUtenteModal?renderModalUtente():''}
        ${state.showNoteModal?renderModalNote():''}
        ${state.showAlertModal?renderModalAlert():''}
        ${state.showDettaglioPratica?renderModalDettaglioPratica():''}
        <footer style="text-align:center;padding:20px;font-size:11px;color:#9ca3af;letter-spacing:1px;text-transform:uppercase;">VERSION 2.5.0 • SLS TECH</footer>
    </div>`;
    if(state.activeTab==='avvocati') loadAndRenderAvvocati();
    if(state.activeTab==='notifiche'&&!state.notificheLoading&&state.notifiche.length===0) loadNotifiche().then(()=>{state.notificheLoading=false;render();});
}

function statIcon(icon) {
    const icons = {
        folder:`<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>`,
        refresh:`<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>`,
        check:`<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>`,
        block:`<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>`,
    };
    return icons[icon]||'';
}

function renderDashboard(stats) {
    const statItems=[{label:'Totale Pratiche',val:stats.totali,icon:'folder'},{label:'In Svolgimento',val:stats.svolgimento,icon:'refresh'},{label:'Completate',val:stats.fatto,icon:'check'},{label:'Bloccate',val:stats.bloccato,icon:'block'}];
    return `
    <div style="display:flex;flex-direction:column;gap:24px;">
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;">
            ${statItems.map(s=>`
            <div class="sls-card" style="padding:22px 20px;display:flex;justify-content:space-between;align-items:center;">
                <div><div style="font-size:13px;color:#6b7280;font-weight:500;margin-bottom:6px;">${s.label}</div><div style="font-size:38px;font-weight:700;color:#111;line-height:1.1;">${s.val}</div></div>
                <div class="purple-icon" style="width:52px;height:52px;">${statIcon(s.icon)}</div>
            </div>`).join('')}
        </div>
        <div style="display:flex;gap:12px;">
            <button onclick="switchTab('pratiche');openPraticaModal(null)" class="btn-purple" style="flex:1;padding:14px;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;">➕ Nuova Pratica</button>

        const scaduta=isPraticaScaduta(p),inScad=isPraticaInScadenza(p),fatto=p.stato==='fatto';
        return `
        <div class="sls-card ${fatto?'pratica-fatto-card':scaduta?'scaduta':''}" style="${inScad&&!fatto?'border-left:4px solid #f97316;':''}padding:20px;">

                <div style="flex:1;min-width:0;">
                    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">
                        <span class="${getStatoBadge(p.stato)}">${getStatoIcon(p.stato)} ${p.stato.toUpperCase()}</span>
                        <span class="${getPrioritaBadge(p.priorita)}">${p.priorita.toUpperCase()}</span>
                        <span class="badge" style="background:#f3f4f6;color:#374151;">${p.tipo_pratica}</span>
                        ${p.autorita?`<span class="badge" style="background:#eff6ff;color:#1d4ed8;">🏛️ ${p.autorita}</span>`:''}

                        ${p.responsabile_dipartimento?`<span class="badge" style="background:#f5f3ff;color:#7c3aed;">🏢 ${p.responsabile_dipartimento}</span>`:''}
                        ${inScad&&!fatto?`<span class="badge" style="background:#fff7ed;color:#c2410c;">🔔 Scade tra ${Math.ceil((new Date(p.scadenza)-new Date())/(1000*60*60*24))}gg</span>`:''}
                        ${scaduta&&!fatto?`<span class="badge" style="background:#fef2f2;color:#dc2626;">⚠️ SCADUTA</span>`:''}
                    </div>
                    <h3 style="font-size:17px;font-weight:700;color:#111;margin:0 0 4px;" class="${fatto?'fatto-strike':''}">${p.cliente}</h3>
                    <p style="color:#6b7280;font-size:14px;margin:0 0 10px;" class="${fatto?'fatto-strike':''}">${p.descrizione}</p>

                    </div>
                </div>
                <div style="display:flex;gap:8px;position:relative;z-index:20;" class="no-print">
                    <button onclick="viewPratica('${p.id}')" class="btn-green" style="padding:9px 16px;font-size:13px;">👁️ Vedi</button>
                    <button onclick="openPraticaModal(${JSON.stringify(p).replace(/"/g,'&quot;')})" class="btn-purple" style="padding:9px 16px;font-size:13px;">✏️</button>

            </div>
        </div>`;

}

                                        ${a.diff_giorni!==null?`<span>${a.diff_giorni<=0?`Scaduta da ${Math.abs(a.diff_giorni)}gg`:`${a.diff_giorni}gg al termine`}</span>`:''}

                            <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;" onclick="event.stopPropagation()">
                                <span class="badge" style="${a.tipo==='scaduta'?'background:#fecaca;color:#dc2626;':'background:#fed7aa;color:#c2410c;'}">${a.tipo==='scaduta'?'⚠️ Scaduta':'🔔 Imminente'}</span>
                                ${pratica?`<span style="font-size:12px;color:#9333ea;font-weight:600;">📂</span>`:''}
                                <button onclick="event.stopPropagation();cancellaNotifica('${a.id}')" style="width:28px;height:28px;border-radius:50%;background:#f3f4f6;border:none;color:#9ca3af;cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;" onmouseover="this.style.background='#fef2f2';this.style.color='#dc2626'" onmouseout="this.style.background='#f3f4f6';this.style.color='#9ca3af'">✕</button>

function modalOverlay(content) {

    <div class="sls-modal animate-slidedown" style="margin:auto;max-height:90vh;display:flex;flex-direction:column;">
        <div class="sls-modal-header" style="flex-shrink:0;">
            <h2 style="color:#fff;font-size:20px;font-weight:700;margin:0;">${soloColore?'🎨 Colore':state.editingAvvocato?'✏️ Modifica':'➕ Nuovo'} Avvocato</h2>
            <button class="sls-modal-close" onclick="state.showAvvocatoModal=false;render()">✕</button>
        </div>
        <div style="padding:24px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;">
            ${soloColore?'':`
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div><label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:8px;">Nome *</label><input type="text" value="${state.avvForm.nome}" oninput="state.avvForm.nome=this.value" class="sls-input"/></div>
                <div><label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:8px;">Cognome *</label><input type="text" value="${state.avvForm.cognome}" oninput="state.avvForm.cognome=this.value" class="sls-input"/></div>
            </div>
            <div><label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:8px;">Email *</label><input type="email" value="${state.avvForm.email}" oninput="state.avvForm.email=this.value" class="sls-input"/></div>
            <div><label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:8px;">Telefono *</label><input type="tel" value="${state.avvForm.telefono}" oninput="state.avvForm.telefono=this.value" class="sls-input"/></div>
            <div><label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:8px;">Specializzazione *</label>
            <select onchange="state.avvForm.specializzazione=this.value" class="sls-input">
                ${TIPI_PRATICA.map(s=>`<option value="${s}" ${state.avvForm.specializzazione===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
            </select></div>`}
            <div>
                <label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:10px;">🎨 Colore Avatar</label>
                <div style="display:flex;align-items:center;gap:12px;background:#f9fafb;border-radius:14px;padding:14px;margin-bottom:12px;">
                    <span class="avv-avatar-lg" style="background:${col};">${getIniziali((state.avvForm.nome||'')+' '+(state.avvForm.cognome||state.editingAvvocato?.nome_completo||''))}</span>
                    <div><p style="font-weight:600;color:#111;margin:0;">${state.avvForm.nome||''} ${state.avvForm.cognome||state.editingAvvocato?.nome_completo||''}</p><p style="font-size:12px;color:#9ca3af;margin:2px 0;">Anteprima colore</p></div>
                </div>
                <div style="display:flex;flex-wrap:wrap;gap:10px;background:#f9fafb;border-radius:14px;padding:14px;margin-bottom:10px;">
                    ${PALETTE_COLORI.map(c=>`<div class="color-swatch ${col===c?'selected':''}" style="background:${c};" onclick="state.avvForm.colore='${c}';render()"></div>`).join('')}
                </div>
                <div style="display:flex;align-items:center;gap:10px;">
                    <label style="font-size:13px;color:#374151;font-weight:600;">Personalizzato:</label>
                    <input type="color" value="${col}" oninput="state.avvForm.colore=this.value;render()" style="width:40px;height:40px;border-radius:10px;cursor:pointer;border:2px solid #e5e7eb;"/>
                    <span style="font-size:13px;color:#9ca3af;font-family:monospace;">${col}</span>
                </div>
            </div>
            <div style="display:flex;gap:10px;padding-top:8px;">
                <button onclick="submitAvvocato()" class="btn-purple" style="flex:1;padding:14px;font-size:15px;">💾 ${state.editingAvvocato?'Aggiorna':'Salva'}</button>
                <button onclick="state.showAvvocatoModal=false;render()" class="btn-white" style="padding:14px 20px;font-size:14px;">Annulla</button>
            </div>
        </div>
    </div>`);
}

function renderModalUtente() {
    return modalOverlay(`
    <div class="sls-modal animate-slidedown" style="margin:auto;">
        <div class="sls-modal-header">
            <h2 style="color:#fff;font-size:20px;font-weight:700;margin:0;">${state.editingUtente?'✏️ Modifica':'➕ Nuovo'} Utente</h2>
            <button class="sls-modal-close" onclick="state.showUtenteModal=false;render()">✕</button>
        </div>
        <div style="padding:24px;display:flex;flex-direction:column;gap:16px;">
            <div><label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:8px;">Username *</label><input type="text" value="${state.utenteForm.username}" ${state.editingUtente?'disabled':''} oninput="state.utenteForm.username=this.value" class="sls-input" style="${state.editingUtente?'background:#f3f4f6;':''}"/></div>
            <div><label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:8px;">Password ${state.editingUtente?'(vuoto = invariata)':'*'}</label><input type="password" value="${state.utenteForm.password||''}" oninput="state.utenteForm.password=this.value" class="sls-input"/></div>
            <div><label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:8px;">Nome Completo *</label><input type="text" value="${state.utenteForm.nome_completo}" oninput="state.utenteForm.nome_completo=this.value" class="sls-input"/></div>
            <div><label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:8px;">Email *</label><input type="email" value="${state.utenteForm.email}" oninput="state.utenteForm.email=this.value" class="sls-input"/></div>
            <div><label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:8px;">Ruolo *</label>
            <select onchange="state.utenteForm.ruolo=this.value" class="sls-input">
                <option value="avvocato" ${state.utenteForm.ruolo==='avvocato'?'selected':''}>⚖️ Avvocato</option>
                <option value="responsabile_dipartimento" ${state.utenteForm.ruolo==='responsabile_dipartimento'?'selected':''}>🏢 Responsabile Dipartimento</option>
                <option value="amministratore" ${state.utenteForm.ruolo==='amministratore'?'selected':''}>👑 Amministratore</option>
            </select></div>
            <div style="display:flex;gap:10px;padding-top:8px;">
                <button onclick="submitUtente()" class="btn-purple" style="flex:1;padding:14px;font-size:15px;">💾 ${state.editingUtente?'Aggiorna':'Crea'}</button>
                <button onclick="state.showUtenteModal=false;render()" class="btn-white" style="padding:14px 20px;font-size:14px;">Annulla</button>
            </div>
        </div>
    </div>`);
}

function renderModalNote() {
    const p=state.viewingPratica;
    return modalOverlay(`
    <div class="sls-modal animate-slidedown" style="margin:auto;max-height:90vh;display:flex;flex-direction:column;">
        <div class="sls-modal-header" style="flex-shrink:0;">
            <div style="flex:1;">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
                    ${avvAvatar(p?.avvocato,true)}
                    <h2 style="color:#fff;font-size:18px;font-weight:700;margin:0;">${p?.cliente}</h2>
                </div>
                <p style="color:rgba(255,255,255,0.7);font-size:13px;margin:0;">${p?.descrizione}</p>
            </div>
            <button class="sls-modal-close" onclick="state.showNoteModal=false;render()">✕</button>
        </div>
        <div style="padding:24px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;">
            ${isAdmin()||isResp()?`<div style="display:flex;justify-content:flex-end;"><button onclick="state.showNoteModal=false;openPraticaModal(state.viewingPratica)" class="btn-purple" style="padding:10px 18px;font-size:13px;">✏️ Modifica Pratica</button></div>`:''}
            <div style="background:#f5f3ff;border-radius:16px;padding:18px;border:1px solid #ede9fe;">
                <label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:8px;">📝 Aggiungi Nota</label>
                <textarea oninput="state.noteForm.nota=this.value" rows="3" class="sls-input" style="background:#fff;margin-bottom:10px;" placeholder="Scrivi qui la nota...">${state.noteForm.nota||''}</textarea>
                <button onclick="submitNota()" class="btn-purple" style="padding:10px 20px;font-size:14px;">➕ Aggiungi Nota</button>
            </div>
            <h3 style="font-size:16px;font-weight:700;color:#111;margin:0;">📜 Storico Note</h3>
            ${state.noteAggiornamento.length>0?`
            <div style="display:flex;flex-direction:column;gap:10px;">
                ${state.noteAggiornamento.map(n=>`
                <div style="padding:16px;background:linear-gradient(135deg,#f5f3ff,#ede9fe);border-radius:14px;border-left:4px solid #9333ea;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                        <div style="display:flex;align-items:center;gap:8px;">${avvAvatar(n.autore)}<strong style="font-size:13px;">${n.autore}</strong></div>
                        <span style="font-size:12px;color:#9ca3af;">📅 ${fmtDate(n.data_nota)}</span>
                    </div>
                    <p style="color:#374151;font-size:14px;margin:0;">${n.nota}</p>
                </div>`).join('')}
            </div>`:`<p style="text-align:center;color:#9ca3af;padding:30px;">Nessuna nota ancora inserita</p>`}
        </div>
    </div>`);
}

function renderModalAlert() {
    return modalOverlay(`
    <div class="sls-modal animate-slidedown" style="margin:auto;max-height:85vh;display:flex;flex-direction:column;">
        <div style="background:linear-gradient(135deg,#f97316,#dc2626);border-radius:20px 20px 0 0;padding:24px 28px;display:flex;justify-content:space-between;align-items:center;">
            <h2 style="color:#fff;font-size:20px;font-weight:700;margin:0;">🔔 Alert Scadenze</h2>
            <button class="sls-modal-close" onclick="state.showAlertModal=false;render()">✕</button>
        </div>
        <div style="padding:24px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;">
            ${state.alertList.filter(a=>a.tipo==='scaduta').length>0?`
            <div>
                <h3 style="font-size:15px;font-weight:700;color:#dc2626;margin:0 0 10px;">⚠️ Pratiche già scadute</h3>
                ${state.alertList.filter(a=>a.tipo==='scaduta').map(({pratica:p,diff})=>`
                <div style="padding:16px;background:#fef2f2;border:2px solid #fecaca;border-radius:14px;margin-bottom:8px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                        <div style="display:flex;align-items:center;gap:8px;">${avvAvatar(p.avvocato)}<strong>${p.cliente}</strong></div>
                        <span class="badge" style="background:#fecaca;color:#dc2626;">Scaduta da ${Math.abs(diff)}gg</span>
                    </div>
                    <div style="display:flex;gap:12px;font-size:12px;color:#9ca3af;flex-wrap:wrap;">
                        ${p.autorita?`<span>🏛️ ${p.autorita}</span>`:''}
                        <span>📅 <strong style="color:#dc2626;">${fmtDate(p.scadenza)}</strong></span>
                        <span>👤 ${p.avvocato}</span>
                    </div>
                </div>`).join('')}
            </div>`:''}
            ${state.alertList.filter(a=>a.tipo==='imminente').length>0?`
            <div>
                <h3 style="font-size:15px;font-weight:700;color:#ea580c;margin:0 0 10px;">🔔 In scadenza</h3>
                ${state.alertList.filter(a=>a.tipo==='imminente').map(({pratica:p,diff})=>`
                <div style="padding:16px;background:#fff7ed;border:2px solid #fed7aa;border-radius:14px;margin-bottom:8px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                        <div style="display:flex;align-items:center;gap:8px;">${avvAvatar(p.avvocato)}<strong>${p.cliente}</strong></div>
                        <span class="badge" style="background:#fed7aa;color:#c2410c;">Scade tra ${diff}gg</span>
                    </div>
                    <div style="display:flex;gap:12px;font-size:12px;color:#9ca3af;flex-wrap:wrap;">
                        ${p.autorita?`<span>🏛️ ${p.autorita}</span>`:''}
                        <span>📅 <strong style="color:#ea580c;">${fmtDate(p.scadenza)}</strong></span>
                        <span>👤 ${p.avvocato}</span>
                    </div>
                </div>`).join('')}
            </div>`:''}
            <button onclick="state.showAlertModal=false;render()" style="width:100%;padding:14px;background:linear-gradient(135deg,#f97316,#dc2626);color:#fff;border:none;border-radius:12px;font-weight:600;cursor:pointer;font-size:14px;">✅ Ho capito</button>
        </div>
    </div>`);
}

function renderPraticheResult() {
    const el=document.getElementById('praticheResult');if(!el)return;
    const filtered=getFiltered();
    el.innerHTML=state.viewMode==='table'?renderPraticheTable(filtered):renderPraticheCards(filtered);
    const inp=document.getElementById('searchInput');
    if(inp){const pos=inp.value.length;inp.focus();inp.setSelectionRange(pos,pos);}
}

function switchTab(tab) {
    state.activeTab=tab;
    if(tab==='notifiche'){state.notifiche=[];state.notificheLoading=false;}
    render();
    if(tab==='avvocati') loadAndRenderAvvocati();
}

async function loadAndRenderAvvocati() {
    const html=await renderAvvocati();
    const el=document.getElementById('avvocatiContainer');
    if(el) el.outerHTML=html;
}

async function doLogin() {
    const u=document.getElementById('loginUsername').value;
    const p=document.getElementById('loginPassword').value;
    if(!u||!p){alert('Inserisci username e password');return;}
    await login(u,p);
}

function openPraticaModal(p) {
    state.editingPratica=p;
    state.formData=p?{...p,nota_aggiornamento:'',alert_giorni:p.alert_giorni||''}:{cliente:'',tipo_pratica:'civile',autorita:'',descrizione:'',stato:'svolgimento',data_apertura:today(),data_aggiornamento_attivita:today(),scadenza:'',timeline:'',priorita:'media',rgnr:'',avvocato:'',nota_aggiornamento:'',alert_giorni:'1',responsabile_dipartimento:''};
    state.showModal=true;state.showNoteModal=false;state.showDettaglioPratica=false;render();
}

function openAvvocatoModal(a) {
    state.editingAvvocato=a;
    state.avvForm=a?{nome:a.nome,cognome:a.cognome,email:a.email,telefono:a.telefono,specializzazione:a.specializzazione,colore:a.colore||getAvvColor(a.nome_completo)}:{nome:'',cognome:'',email:'',telefono:'',specializzazione:'civile',colore:'#9333ea'};
    state.showAvvocatoModal=true;render();
}

function openUtenteModal(u) {
    state.editingUtente=u;
    state.utenteForm=u?{username:u.username,password:'',nome_completo:u.nome_completo,email:u.email,ruolo:u.ruolo}:{username:'',password:'',nome_completo:'',email:'',ruolo:'avvocato'};
    state.showUtenteModal=true;render();
}

async function openNoteModal(praticaId) {
    const p=state.pratiche.find(pr=>pr.id===praticaId);
    state.viewingPratica=p;state.noteForm={nota:''};
    await loadNote(praticaId);
    state.showNoteModal=true;render();
}

async function viewPratica(praticaId){await openNoteModal(praticaId);}

async function apriDettaglioNotifica(praticaId) {
    const p=state.pratiche.find(pr=>pr.id===praticaId);
    if(!p){alert('Pratica non trovata.');return;}
    state.viewingPratica=p;await loadNote(praticaId);
    state.showDettaglioPratica=true;render();
}

async function aggiungiAlDip(respId,respNome) {
    const sel=document.getElementById(`addAvv_${respId}`);if(!sel||!sel.value)return;
    const avvNome=sel.value;
    const avvUtente=state.utenti.find(u=>u.nome_completo===avvNome);
    const respUtente=state.utenti.find(u=>u.nome_completo===respNome);
    const nomeDip=document.getElementById(`nomeDip_${respId}`)?.value||state.dipartimenti.find(d=>d.responsabile===respNome)?.nome_dipartimento||'';
    await saveDipartimento(respNome,respUtente?.id||null,avvNome,avvUtente?.id||null,nomeDip);
    showSuccess(`${avvNome} aggiunto al dipartimento`);render();
}

async function confirmDeleteDip(id) {
    if(confirm('Rimuovere questo avvocato dal dipartimento?')){await deleteDipartimento(id);showSuccess('Rimosso.');render();}
}

async function submitPratica() {
    const f=state.formData,orig=state.editingPratica,isNuova=!orig;
    if(!f.cliente||!f.descrizione||!f.avvocato){alert('Compila tutti i campi obbligatori (*)');return;}
    if(!isAdmin()&&!isResp()&&!isNuova){
        if(f.scadenza&&orig.scadenza&&f.scadenza<orig.scadenza){alert('⚠️ Non puoi retrodatare la scadenza!');return;}
        if(f.data_aggiornamento_attivita&&orig.data_aggiornamento_attivita&&f.data_aggiornamento_attivita<orig.data_aggiornamento_attivita){alert('⚠️ Non puoi retrodatare!');return;}
        f.data_apertura=orig.data_apertura;
    }
    const p={...f};if(orig)p.id=orig.id;
    p.data_modifica=today();p.data_aggiornamento_attivita=today();
    const ok=await savePratica(p);
    if(ok){
        if(orig&&f.scadenza&&f.scadenza>today()) await cancellaNotificheScadenzaSpostata(orig.id,f.scadenza);
        state.showModal=false;state.editingPratica=null;showSuccess('Pratica salvata!');render();
    }
}

async function submitAvvocato() {
    const soloColore=!isAdmin()&&state.editingAvvocato;
    if(!soloColore&&(!state.avvForm.nome||!state.avvForm.cognome||!state.avvForm.email||!state.avvForm.telefono)){alert('Compila tutti i campi');return;}
    const a={...state.avvForm};if(state.editingAvvocato)a.id=state.editingAvvocato.id;
    const ok=await saveAvvocato(a);
    if(ok){state.showAvvocatoModal=false;state.editingAvvocato=null;showSuccess('Avvocato aggiornato!');render();}
}

async function submitUtente() {
    if(!state.utenteForm.username||!state.utenteForm.nome_completo||!state.utenteForm.email){alert('Compila tutti i campi');return;}
    if(!state.editingUtente&&!state.utenteForm.password){alert('Inserisci una password');return;}
    const u={...state.utenteForm};if(state.editingUtente)u.id=state.editingUtente.id;u.attivo=true;
    const ok=await saveUtente(u);
    if(ok){state.showUtenteModal=false;state.editingUtente=null;showSuccess('Utente salvato!');render();}
}

async function submitNota() {
    if(!state.noteForm.nota){alert('Scrivi una nota!');return;}
    const ok=await aggiungiNota(state.viewingPratica.id,state.noteForm.nota);
    if(ok){state.noteForm={nota:''};showSuccess('Nota aggiunta!');render();}
}

function confirmDeletePratica(id){if(isAdmin()&&confirm('Eliminare questa pratica?'))deletePratica(id);}
function confirmDeleteAvvocato(id){if(isAdmin()&&confirm('Eliminare questo avvocato?'))deleteAvvocato(id);}
function confirmDeleteUtente(id){if(confirm('Eliminare questo utente?'))deleteUtente(id);}


render();
</script>
</body>
</html>
